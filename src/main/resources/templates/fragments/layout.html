<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: '美味外卖 — 本地生活服务平台'">美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<!-- ===== 顶部导航栏 ===== -->
<nav class="navbar navbar-expand-lg fixed-top shadow-sm" id="mainNav"
     th:fragment="header">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-shop"></i> <span style="color:var(--meituan-yellow)">美味</span>外卖
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarContent">
            <!-- 搜索框 (消费者) -->
            <form sec:authorize="hasRole('CONSUMER')" class="d-flex mx-auto search-box"
                  th:action="@{/consumer/index}" method="get">
                <div class="input-group" style="max-width:400px">
                    <input type="text" class="form-control" placeholder="搜索商家..." name="keyword" th:value="${keyword}">
                    <button class="btn btn-warning" type="submit"><i class="bi bi-search"></i></button>
                </div>
            </form>
            <ul class="navbar-nav ms-auto align-items-center">
                <!-- 消费者导航 -->
                <li sec:authorize="hasRole('CONSUMER')" class="nav-item">
                    <a class="nav-link" th:href="@{/consumer/index}"><i class="bi bi-house"></i> 首页</a>
                </li>
                <li sec:authorize="hasRole('CONSUMER')" class="nav-item">
                    <a class="nav-link" th:href="@{/consumer/orders}"><i class="bi bi-receipt"></i> 订单</a>
                </li>
                <li sec:authorize="hasRole('CONSUMER')" class="nav-item">
                    <a class="nav-link" th:href="@{/consumer/balance}"><i class="bi bi-wallet2"></i> 余额</a>
                </li>
                <!-- 商家导航 -->
                <li sec:authorize="hasRole('MERCHANT')" class="nav-item">
                    <a class="nav-link" th:href="@{/merchant/orders}"><i class="bi bi-receipt"></i> 订单管理</a>
                </li>
                <li sec:authorize="hasRole('MERCHANT')" class="nav-item">
                    <a class="nav-link" th:href="@{/merchant/orders}"><i class="bi bi-receipt"></i> 订单</a>
                </li>
                <li sec:authorize="hasRole('MERCHANT')" class="nav-item">
                    <a class="nav-link" th:href="@{/merchant/products-all}"><i class="bi bi-box"></i> 商品管理</a>
                </li>
                <!-- 用户下拉 -->
                <li sec:authorize="isAuthenticated()" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> <span sec:authentication="name"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li sec:authorize="hasRole('CONSUMER')">
                            <a class="dropdown-item" th:href="@{/consumer/profile}"><i class="bi bi-person"></i> 个人中心</a>
                        </li>
                        <li sec:authorize="hasRole('CONSUMER')">
                            <a class="dropdown-item" th:href="@{/consumer/address}"><i class="bi bi-geo-alt"></i> 收货地址</a>
                        </li>
                        <li sec:authorize="hasRole('MERCHANT')">
                            <a class="dropdown-item" th:href="@{/merchant/shop/edit}"><i class="bi bi-gear"></i> 店铺设置</a>
                        </li>
                        <li sec:authorize="hasRole('MERCHANT')">
                            <a class="dropdown-item" th:href="@{/merchant/categories}"><i class="bi bi-tags"></i> 分类管理</a>
                        </li>
                        <li sec:authorize="hasRole('MERCHANT')">
                            <a class="dropdown-item" th:href="@{/merchant/earnings}"><i class="bi bi-graph-up"></i> 收益统计</a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post" class="m-0">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right"></i> 安全登出
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 消息提示 (fragment) -->
<th:block th:fragment="alerts">
    <div class="container mt-3">
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>
</th:block>

<!-- 页脚 (fragment) — 修复: 将 Bootstrap JS 和 main.js 移入 fragment 内，确保所有页面都能使用 Modal -->
<footer th:fragment="footer" class="bg-light py-4 mt-5 border-top">
    <div class="container text-center text-muted">
        <small>&copy; 2024 美味外卖平台 — 仿美团外卖本地生活服务平台</small>
    </div>
</footer>

<!-- 核心脚本 (fragment) — 必须内嵌在 fragment 中才能被各页面的 th:replace 加载 -->
<th:block th:fragment="scripts">
    <div id="pageLoadingBar"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js?v=3"></script>
</th:block>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;background:var(--bg)">
<div class="empty-state">
    <span class="empty-icon" style="font-size:5rem">🔍</span>
    <h1 class="display-4 fw-bold text-yellow">404</h1>
    <p class="empty-text fs-5">页面不存在</p>
    <p class="empty-hint mb-4">您访问的页面可能已被移除或地址有误</p>
    <a href="/" class="btn btn-warning fw-bold px-4 rounded-pill">
        <i class="bi bi-house"></i> 返回首页
    </a>
</div>
</body>
</html>

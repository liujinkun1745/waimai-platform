<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<!--
修复说明：
  Bug 1 根因：(a) 第34行 data-summary 中 addr.provider 拼写错误，应为 addr.province；
            (b) 第50行 th:attr onclick 存在引号转义冲突，改用 data-* + 事件委托。
  Bug 3：统一返回按钮样式 + 添加至所有操作入口。
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收货地址 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <!-- 统一返回按钮 -->
    <a href="javascript:history.back()" class="back-btn mb-3"><i class="bi bi-chevron-left"></i> 返回</a>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0"><i class="bi bi-geo-alt"></i> 收货地址</h5>
        <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#addressModal"
                onclick="clearForm()">
            <i class="bi bi-plus-lg"></i> 新增地址
        </button>
    </div>

    <!-- 地址列表 -->
    <div th:if="${#lists.isEmpty(addresses)}" class="text-center py-5 text-muted">
        <i class="bi bi-geo-alt" style="font-size:3rem"></i>
        <p class="mt-2">暂无收货地址，请添加</p>
    </div>

    <!-- 修复: data-summary 中的 addr.provider → addr.province -->
    <div th:each="addr : ${addresses}" class="card shadow-sm mb-2 address-row"
         th:attr="data-id=${addr.id},data-summary=${addr.province + addr.city + addr.district + addr.detailAddress + ' | ' + addr.receiverName + ' ' + addr.receiverPhone},data-default=${addr.isDefault}">
        <div class="card-body p-3">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6 class="mb-1">
                        <i class="bi bi-geo-alt-fill text-warning"></i>
                        <span th:text="${addr.province + addr.city + addr.district + addr.detailAddress}"></span>
                        <span th:if="${addr.isDefault}" class="badge bg-warning text-dark ms-1">默认</span>
                    </h6>
                    <small class="text-muted">
                        <span th:text="${addr.receiverName}"></span> ·
                        <span th:text="${addr.receiverPhone}"></span>
                    </small>
                </div>
                <div class="btn-group btn-group-sm">
                    <!-- 修复: 编辑按钮改用 data-* 属性，事件委托绑定避免引号转义问题 -->
                    <button class="btn btn-outline-warning btn-sm edit-addr-btn"
                            data-bs-toggle="modal" data-bs-target="#addressModal"
                            th:attr="data-id=${addr.id},data-name=${addr.receiverName},data-phone=${addr.receiverPhone},data-province=${addr.province},data-city=${addr.city},data-district=${addr.district},data-detail=${addr.detailAddress},data-default=${addr.isDefault}">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <a th:href="@{/consumer/address/delete/{id}(id=${addr.id})}"
                       class="btn btn-outline-danger btn-sm"
                       onclick="return confirm('确定删除该地址吗？')">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 地址 Modal -->
<div class="modal fade" id="addressModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/consumer/address/add}" method="post" id="addrForm">
                <div class="modal-header">
                    <h5 class="modal-title" id="addrModalTitle">新增地址</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label">收货人</label>
                            <input type="text" name="receiverName" id="addrName" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">联系电话</label>
                            <input type="text" name="receiverPhone" id="addrPhone" class="form-control" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label">省</label>
                            <input type="text" name="province" id="addrProvince" class="form-control" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label">市</label>
                            <input type="text" name="city" id="addrCity" class="form-control" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label">区</label>
                            <input type="text" name="district" id="addrDistrict" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">详细地址</label>
                            <input type="text" name="detailAddress" id="addrDetail" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input type="checkbox" name="isDefault" value="true" id="addrDefault" class="form-check-input">
                                <label class="form-check-label" for="addrDefault">设为默认地址</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-warning">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 加载 Bootstrap JS -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
<th:block th:replace="~{fragments/consumer-nav :: bottom-nav}"></th:block>

<script>
    // 新增地址 — 重置表单
    function clearForm() {
        document.getElementById('addrModalTitle').textContent = '新增地址';
        document.getElementById('addrForm').action = '/consumer/address/add';
        document.getElementById('addrName').value = '';
        document.getElementById('addrPhone').value = '';
        document.getElementById('addrProvince').value = '';
        document.getElementById('addrCity').value = '';
        document.getElementById('addrDistrict').value = '';
        document.getElementById('addrDetail').value = '';
        document.getElementById('addrDefault').checked = false;
    }

    // 编辑地址 — 事件委托，解决 th:attr 内联 onclick 引号转义问题
    document.addEventListener('click', function (e) {
        var btn = e.target.closest('.edit-addr-btn');
        if (!btn) return;
        document.getElementById('addrModalTitle').textContent = '编辑地址';
        document.getElementById('addrForm').action = '/consumer/address/edit/' + btn.getAttribute('data-id');
        document.getElementById('addrName').value = btn.getAttribute('data-name') || '';
        document.getElementById('addrPhone').value = btn.getAttribute('data-phone') || '';
        document.getElementById('addrProvince').value = btn.getAttribute('data-province') || '';
        document.getElementById('addrCity').value = btn.getAttribute('data-city') || '';
        document.getElementById('addrDistrict').value = btn.getAttribute('data-district') || '';
        document.getElementById('addrDetail').value = btn.getAttribute('data-detail') || '';
        document.getElementById('addrDefault').checked = (btn.getAttribute('data-default') === 'true');
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单详情 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <a th:href="@{/consumer/orders}" class="btn btn-outline-warning btn-sm mb-3">
        <i class="bi bi-arrow-left"></i> 返回订单列表
    </a>

    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-0">
                        <i class="bi bi-shop text-warning"></i>
                        <span th:text="${order.merchant.shopName}">商家名称</span>
                        <small class="text-muted ms-2">订单号: <span th:text="${order.orderNo}"></span></small>
                    </h6>
                </div>
                <span class="badge fs-6" th:classappend="${order.status == '待接单' || order.status == '待配送' || order.status == '配送中' ? 'bg-warning text-dark' : (order.status == '已完成' ? 'bg-success' : (order.status == '已取消' ? 'bg-secondary' : 'bg-info'))}"
                      th:text="${order.status}"></span>
            </div>
        </div>
        <div class="card-body">
            <!-- 商品列表 -->
            <h6 class="fw-bold">商品清单</h6>
            <table class="table table-sm">
                <thead class="table-light">
                    <tr>
                        <th>商品</th>
                        <th class="text-end">单价</th>
                        <th class="text-end">数量</th>
                        <th class="text-end">小计</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.productName}"></td>
                        <td class="text-end">¥<span th:text="${item.price}"></span></td>
                        <td class="text-end" th:text="${item.quantity}"></td>
                        <td class="text-end fw-bold">¥<span th:text="${item.subtotal}"></span></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="table-warning">
                        <td colspan="3" class="text-end fw-bold">总金额</td>
                        <td class="text-end fw-bold text-danger fs-6">¥<span th:text="${order.totalAmount}"></span></td>
                    </tr>
                </tfoot>
            </table>

            <!-- 订单信息 -->
            <h6 class="fw-bold mt-4">订单信息</h6>
            <div class="row small text-muted">
                <div class="col-md-6">
                    <p>下单时间：<span th:text="${#temporals.format(order.createdAt,'yyyy-MM-dd HH:mm:ss')}"></span></p>
                    <p th:if="${order.paidAt}">支付时间：<span th:text="${#temporals.format(order.paidAt,'yyyy-MM-dd HH:mm:ss')}"></span></p>
                    <p th:if="${order.acceptedAt}">接单时间：<span th:text="${#temporals.format(order.acceptedAt,'yyyy-MM-dd HH:mm:ss')}"></span></p>
                </div>
                <div class="col-md-6">
                    <p th:if="${order.deliveredAt}">配送时间：<span th:text="${#temporals.format(order.deliveredAt,'yyyy-MM-dd HH:mm:ss')}"></span></p>
                    <p th:if="${order.completedAt}">完成时间：<span th:text="${#temporals.format(order.completedAt,'yyyy-MM-dd HH:mm:ss')}"></span></p>
                    <p>配送地址：<span th:text="${order.addressSnapshot}"></span></p>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- 加载 Bootstrap JS 和 main.js -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评价 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .review-page { max-width: 480px; margin: 0 auto; }
        .shop-header {
            display: flex; align-items: center; gap: 14px;
            padding: 16px; border-radius: 16px;
            background: linear-gradient(135deg, #FFF8E1, #FFF);
            margin-bottom: 20px;
        }
        .shop-icon {
            width: 56px; height: 56px; border-radius: 14px;
            background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #FFF; flex-shrink: 0;
        }
        .star-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0; border-bottom: 1px solid #F0F0F0;
        }
        .star-label { font-weight: 600; font-size: 0.95rem; }
        .star-input { display: inline-flex; gap: 10px; }
        .star-input .si { font-size: 2.4rem; color: #E0E0E0; cursor: pointer; transition: all 0.15s; user-select: none; line-height: 0.9; }
        .star-input .si.on { color: #FFB800; transform: scale(1.08); text-shadow: 0 2px 6px rgba(255,184,0,0.3); }
        .comment-area {
            width: 100%; border: 1.5px solid #EEE; border-radius: 12px;
            padding: 14px; font-size: 0.9rem; resize: none;
            transition: border-color 0.2s; outline: none;
        }
        .comment-area:focus { border-color: var(--yellow-dark); }
        .submit-btn {
            width: 100%; padding: 14px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
            font-size: 1rem; font-weight: 700; color: #333;
            cursor: pointer; transition: all 0.2s;
        }
        .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,184,0,0.3); }
        .submit-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4 review-page">
    <a th:href="@{/consumer/order/{id}(id=${order.id})}" class="btn btn-outline-warning btn-sm mb-3">
        <i class="bi bi-arrow-left"></i> 返回订单
    </a>

    <!-- 商家信息 -->
    <div class="shop-header">
        <div class="shop-icon">🍽️</div>
        <div>
            <h6 class="fw-bold mb-1" th:text="${order.merchant.shopName}">商家名称</h6>
            <small class="text-muted">订单: <span th:text="${order.orderNo}"></span></small>
        </div>
    </div>

    <!-- 评分表单 -->
    <div class="card shadow-sm border-0 mb-3" style="border-radius:16px">
        <div class="card-body p-4">
            <form th:action="@{/consumer/order/{id}/review(id=${order.id})}" method="post" id="reviewForm">
                <!-- 口味 -->
                <div class="star-row">
                    <span class="star-label">😋 口味</span>
                    <div class="star-input" data-name="tasteRating">
                        <span class="si on" data-v="1">★</span>
                        <span class="si on" data-v="2">★</span>
                        <span class="si on" data-v="3">★</span>
                        <span class="si on" data-v="4">★</span>
                        <span class="si on" data-v="5">★</span>
                    </div>
                    <input type="hidden" name="tasteRating" value="5">
                </div>
                <!-- 包装 -->
                <div class="star-row">
                    <span class="star-label">📦 包装</span>
                    <div class="star-input" data-name="packagingRating">
                        <span class="si on" data-v="1">★</span>
                        <span class="si on" data-v="2">★</span>
                        <span class="si on" data-v="3">★</span>
                        <span class="si on" data-v="4">★</span>
                        <span class="si on" data-v="5">★</span>
                    </div>
                    <input type="hidden" name="packagingRating" value="5">
                </div>
                <!-- 配送 -->
                <div class="star-row">
                    <span class="star-label">🛵 配送</span>
                    <div class="star-input" data-name="deliveryRating">
                        <span class="si on" data-v="1">★</span>
                        <span class="si on" data-v="2">★</span>
                        <span class="si on" data-v="3">★</span>
                        <span class="si on" data-v="4">★</span>
                        <span class="si on" data-v="5">★</span>
                    </div>
                    <input type="hidden" name="deliveryRating" value="5">
                </div>
                <!-- 文字 -->
                <div class="mt-3 mb-3">
                    <textarea name="comment" class="comment-area" rows="3"
                              placeholder="说说味道怎么样，包装如何，配送快不快？帮助其他小伙伴选择～"></textarea>
                </div>
                <button type="submit" class="submit-btn">
                    ✨ 提交评价
                </button>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
// 星级交互
document.querySelectorAll('.star-input').forEach(function(row) {
    var name = row.dataset.name;
    var stars = row.querySelectorAll('.si');
    var input = document.querySelector('input[name="'+name+'"]');

    function highlight(v) {
        stars.forEach(function(s) {
            s.classList.toggle('on', parseInt(s.dataset.v) <= v);
        });
    }
    stars.forEach(function(s) {
        s.addEventListener('click', function() {
            var v = parseInt(this.dataset.v);
            input.value = v;
            highlight(v);
        });
        s.addEventListener('mouseenter', function() {
            highlight(parseInt(this.dataset.v));
        });
    });
    row.addEventListener('mouseleave', function() {
        highlight(parseInt(input.value));
    });
});
</script>
</body>
</html>

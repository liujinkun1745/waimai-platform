<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <a href="javascript:history.back()" class="btn btn-outline-warning btn-sm mb-3" title="返回上一页">
        <i class="bi bi-arrow-left"></i> 返回
    </a>
    <h5 class="fw-bold mb-3"><i class="bi bi-person"></i> 个人中心</h5>

    <div class="row">
        <div class="col-md-6 mb-3">
            <!-- 基本信息 -->
            <div class="card shadow-sm">
                <div class="card-header bg-white"><h6 class="mb-0">基本信息</h6></div>
                <div class="card-body">
                    <form th:action="@{/consumer/profile/update}" method="post">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" th:value="${user.username}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">手机号</label>
                            <input type="text" class="form-control" th:value="${user.phone}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" name="email" class="form-control" th:value="${user.email}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">账户余额</label>
                            <div class="input-group">
                                <span class="input-group-text">¥</span>
                                <input type="text" class="form-control text-danger fw-bold"
                                       th:value="${user.balance}" disabled>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-lg"></i> 保存修改
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <!-- 修改密码 -->
            <div class="card shadow-sm">
                <div class="card-header bg-white"><h6 class="mb-0">修改密码</h6></div>
                <div class="card-body">
                    <form th:action="@{/consumer/profile/password}" method="post">
                        <div class="mb-3">
                            <label class="form-label">原密码</label>
                            <input type="password" name="oldPassword" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" name="newPassword" class="form-control" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-shield-lock"></i> 修改密码
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- 加载 Bootstrap JS 和 main.js -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>

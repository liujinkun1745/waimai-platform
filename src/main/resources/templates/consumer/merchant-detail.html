<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${merchant.shopName} + ' — 美味外卖'">商家详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .shop-hero {
            background: linear-gradient(135deg, #FFD101 0%, #FF8F00 100%);
            padding: 1.5rem 1rem;
            color: #333;
            position: relative;
            overflow: hidden;
        }
        .shop-hero::after {
            content: '';
            position: absolute;
            right: -30px; top: -30px;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }
        .tab-bar {
            position: sticky; top: 56px; z-index: 1025;
            background: #FFF;
            border-bottom: 1px solid #EEE;
            margin: 0 -12px;
            padding: 0 12px;
        }
        @media (max-width: 768px) {
            .tab-bar { top: 48px; }
        }
        .tab-bar .nav-link {
            color: #666;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 0.6rem 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 0;
        }
        .tab-bar .nav-link.active {
            color: #333;
            border-bottom-color: var(--yellow-dark);
            background: none;
        }
        .bottom-cart-bar {
            position: fixed;
            bottom: 50px;
            left: 0; right: 0;
            background: #333;
            color: #FFF;
            z-index: 1029;
            padding: 0.6rem 1rem;
            display: none;
        }
        .bottom-cart-bar .btn-checkout {
            background: var(--yellow);
            color: #333;
            font-weight: 700;
            border-radius: 24px;
            padding: 0.5rem 1.5rem;
            border: none;
            font-size: 0.9rem;
        }
        .star-rating { color: #FFB800; letter-spacing: 2px; }
        .star-sm { font-size: 0.8rem; }
        .review-card {
            border-bottom: 1px solid #F5F5F5;
            padding: 12px 0;
        }
        .review-card:last-child { border-bottom: none; }
        .rating-bar {
            display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
        }
        .rating-bar .bar-bg {
            flex: 1; height: 6px; background: #F0F0F0; border-radius: 3px; overflow: hidden;
        }
        .rating-bar .bar-fill {
            height: 100%; background: linear-gradient(90deg, var(--yellow), var(--yellow-dark)); border-radius: 3px;
        }
        body { padding-bottom: 110px; }
        /* 分类侧边栏 */
        #categoryNav .list-group-item {
            border: none; border-left: 3px solid transparent;
            font-size: 0.82rem; color: #555; padding: 0.7rem 0.8rem;
            transition: all 0.2s;
        }
        #categoryNav .list-group-item:hover {
            background: #FFF8E1; border-left-color: #FFD101;
        }
        #categoryNav .list-group-item.active {
            background: #FFF8E1; border-left-color: #FFB800;
            color: #333; font-weight: 700;
        }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<!-- ===== 商家 Hero ===== -->
<div class="shop-hero">
    <div style="position:relative;z-index:1">
        <a th:href="@{/consumer/index}" class="back-btn mb-2" style="border-color:rgba(0,0,0,0.15);color:#555">
            <i class="bi bi-chevron-left"></i> 返回
        </a>
        <div class="d-flex align-items-center gap-3">
            <div class="rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
                 style="width:72px;height:72px;background:rgba(255,255,255,0.9);font-size:2rem;color:var(--yellow-dark)">
                🍽️
            </div>
            <div class="flex-grow-1">
                <h4 class="fw-bold mb-1" th:text="${merchant.shopName}">店铺名</h4>
                <div class="small">
                    <span class="me-3"><i class="bi bi-star-fill star-rating"></i> <span th:text="${merchant.rating}">4.5</span></span>
                    <span class="me-3">月售<span th:text="${merchant.monthlySales}">0</span></span>
                    <span th:text="${merchant.businessHours}">09-22</span>
                </div>
            </div>
        </div>
        <div class="d-flex flex-wrap gap-2 mt-2 small">
            <span class="badge bg-white text-dark">配送 ¥<span th:text="${merchant.deliveryFee}">3</span></span>
            <span class="badge bg-white text-dark">起送 ¥<span th:text="${merchant.minOrderAmount}">15</span></span>
            <span class="badge" th:classappend="${merchant.status=='营业中'} ? 'bg-success' : 'bg-secondary'" th:text="${merchant.status}">营业中</span>
        </div>
    </div>
</div>

<!-- ===== Tab 导航 ===== -->
<div class="tab-bar">
    <ul class="nav nav-tabs border-0" id="shopTabs">
        <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tabMenu">点菜</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tabReviews">评价(<span th:text="${reviewCount}">0</span>)</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tabInfo">商家</a></li>
    </ul>
</div>

<div class="container px-0">
<div class="tab-content">
<!-- ================================================================ -->
<!-- Tab 1: 点菜 -->
<!-- ================================================================ -->
<div class="tab-pane fade show active" id="tabMenu">
    <div class="row g-0 px-3">
        <!-- 左侧分类 -->
        <div class="col-3" style="background:#FAFAFA;min-height:100vh;border-right:1px solid #EEE">
            <div class="list-group list-group-flush" id="categoryNav" style="position:sticky;top:105px">
                <a th:each="c : ${categories}" href="#"
                   class="list-group-item list-group-item-action category-link"
                   th:data-category-id="${c.id}"
                   th:classappend="${c.id == currentCategoryId} ? 'active' : ''">
                    <span th:text="${c.name}">分类</span>
                </a>
            </div>
        </div>
        <!-- 右侧商品 -->
        <div class="col-9 px-2 pt-2" id="productList">
            <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 text-muted">
                <p>该分类暂无商品</p>
            </div>
            <div th:each="p : ${products}" class="card product-card mb-2 shadow-sm border-0" th:classappend="${p.status == '下架' or p.stock <= 0} ? 'sold-out' : ''">
                <div class="card-body p-2">
                    <div class="d-flex">
                        <div class="rounded-3 bg-light d-flex align-items-center justify-content-center me-2 flex-shrink-0 overflow-hidden"
                             style="width:80px;height:80px">
                            <img th:if="${p.image != null and !p.image.isEmpty()}"
                                 th:src="${p.image}" alt="" style="width:100%;height:100%;object-fit:cover"
                                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                            <span th:unless="${p.image != null and !p.image.isEmpty()}"
                                  style="font-size:2rem;display:block">🍽️</span>
                            <span style="font-size:2rem;display:none">🍽️</span>
                        </div>
                        <div class="flex-grow-1 min-w-0">
                            <h6 class="mb-1 fw-bold" th:text="${p.name}">商品</h6>
                            <small class="text-muted d-block text-truncate" th:if="${p.description != null}" th:text="${p.description}"></small>
                            <small class="text-muted">月售<span th:text="${p.sales}">0</span></small>
                            <div class="d-flex justify-content-between align-items-center mt-1">
                                <span class="fw-bold text-danger">¥<span th:text="${p.price}">0</span></span>
                                <button class="btn btn-warning btn-sm rounded-pill px-3 add-to-cart-btn"
                                        th:attr="data-id=${p.id},data-name=${p.name},data-price=${p.price}"
                                        th:disabled="${p.status == '下架' or p.stock <= 0}">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ================================================================ -->
<!-- Tab 2: 评价 -->
<!-- ================================================================ -->
<div class="tab-pane fade" id="tabReviews">
    <div class="px-3 pt-3">
        <!-- 评分概览 -->
        <div class="d-flex align-items-center gap-3 mb-3 p-3 rounded-3" style="background:#FFF8E1">
            <div class="text-center">
                <div class="display-5 fw-bold text-warning" th:text="${merchant.rating}">4.5</div>
                <div class="small text-muted"><span th:text="${reviewCount}">0</span>条评价</div>
            </div>
            <div class="flex-grow-1 small">
                <div class="rating-bar"><span>5</span><div class="bar-bg"><div class="bar-fill" th:style="'width:'+${ratingDist[0]*100/ratingDistMax}+'%'"></div></div></div>
                <div class="rating-bar"><span>4</span><div class="bar-bg"><div class="bar-fill" th:style="'width:'+${ratingDist[1]*100/ratingDistMax}+'%'"></div></div></div>
                <div class="rating-bar"><span>3</span><div class="bar-bg"><div class="bar-fill" th:style="'width:'+${ratingDist[2]*100/ratingDistMax}+'%'"></div></div></div>
                <div class="rating-bar"><span>2</span><div class="bar-bg"><div class="bar-fill" th:style="'width:'+${ratingDist[3]*100/ratingDistMax}+'%'"></div></div></div>
                <div class="rating-bar"><span>1</span><div class="bar-bg"><div class="bar-fill" th:style="'width:'+${ratingDist[4]*100/ratingDistMax}+'%'"></div></div></div>
            </div>
        </div>

        <!-- 评价标签 -->
        <div class="d-flex flex-wrap gap-1 mb-3">
            <span class="badge bg-warning text-dark">全部(<span th:text="${reviewCount}">0</span>)</span>
            <span class="badge bg-light text-muted">有图</span>
            <span class="badge bg-light text-muted">好评</span>
        </div>

        <!-- 评价列表 -->
        <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-4 text-muted">
            <p>暂无评价</p>
        </div>
        <div th:each="r : ${reviews}" class="review-card">
            <div class="d-flex align-items-center gap-2 mb-1">
                <div class="rounded-circle bg-warning d-flex align-items-center justify-content-center text-white fw-bold small"
                     style="width:32px;height:32px" th:text="${r.consumer != null ? #strings.substring(r.consumer.username,0,1) : '匿'}">张</div>
                <div>
                    <small class="fw-bold" th:text="${r.consumer != null ? r.consumer.username : '匿名用户'}">用户</small>
                    <span class="star-rating star-sm ms-1">
                        <span th:each="i : ${#numbers.sequence(1,5)}" th:text="${i <= r.overallRating} ? '★' : '☆'"></span>
                    </span>
                </div>
                <small class="text-muted ms-auto" th:text="${#temporals.format(r.createdAt,'MM-dd')}"></small>
            </div>
            <!-- 口味/包装/配送 分项 -->
            <div class="d-flex gap-3 small text-muted mb-1">
                <span>口味 <span class="text-warning" th:text="${r.tasteRating}">5</span></span>
                <span>包装 <span class="text-warning" th:text="${r.packagingRating}">5</span></span>
                <span>配送 <span class="text-warning" th:text="${r.deliveryRating}">5</span></span>
            </div>
            <p class="small mb-1" th:if="${r.comment != null and !r.comment.isEmpty()}" th:text="${r.comment}"></p>
            <!-- 商家回复 -->
            <div th:if="${r.reply != null and !r.reply.isEmpty()}" class="mt-2 p-2 rounded small" style="background:#FFF8E1;border-left:3px solid var(--yellow)">
                <span class="fw-bold text-warning"><i class="bi bi-shop"></i> 商家回复：</span>
                <span class="text-muted" th:text="${r.reply}"></span>
            </div>
            <!-- 订单摘要 -->
            <th:block th:if="${r.order != null and reviewItemsMap.containsKey(r.order.id)}">
                <div class="small mt-1">
                    <span class="text-muted">点了：</span>
                    <span class="text-muted" th:each="item,it : ${reviewItemsMap.get(r.order.id)}"
                          th:text="${item.productName + (it.index < reviewItemsMap.get(r.order.id).size() - 1 ? '、' : '')}"></span>
                    <a href="#" class="text-decoration-none small ms-1" data-bs-toggle="collapse"
                       th:attr="data-bs-target='#orderDetail-'+${r.id}">
                        <i class="bi bi-chevron-down"></i> 详情
                    </a>
                </div>
                <div class="collapse mt-1 p-2 rounded-2 small" style="background:#F8F9FA"
                     th:attr="id='orderDetail-'+${r.id}">
                    <div class="text-muted mb-1">订单号: <span th:text="${r.order.orderNo}"></span></div>
                    <div th:each="item : ${reviewItemsMap.get(r.order.id)}"
                         class="d-flex justify-content-between py-1 border-bottom border-light">
                        <span th:text="${item.productName}"></span>
                        <span>×<span th:text="${item.quantity}">1</span> ¥<span th:text="${item.subtotal}">0</span></span>
                    </div>
                    <div class="text-end mt-1 fw-bold">合计: ¥<span th:text="${r.order.totalAmount}">0</span></div>
                </div>
            </th:block>
        </div>
    </div>
</div>

<!-- ================================================================ -->
<!-- Tab 3: 商家信息 -->
<!-- ================================================================ -->
<div class="tab-pane fade" id="tabInfo">
    <div class="px-3 pt-3">
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body">
                <h6 class="fw-bold"><i class="bi bi-info-circle text-yellow"></i> 商家信息</h6>
                <div class="small">
                    <p class="mb-1"><span class="text-muted">店铺名称：</span><span th:text="${merchant.shopName}"></span></p>
                    <p class="mb-1"><span class="text-muted">营业时间：</span><span th:text="${merchant.businessHours}"></span></p>
                    <p class="mb-1"><span class="text-muted">店铺地址：</span><span th:text="${merchant.shopAddress}"></span></p>
                    <p class="mb-1"><span class="text-muted">配送费：</span>¥<span th:text="${merchant.deliveryFee}"></span></p>
                    <p class="mb-1"><span class="text-muted">起送价：</span>¥<span th:text="${merchant.minOrderAmount}"></span></p>
                </div>
                <p class="small text-muted mt-2 mb-0" th:text="${merchant.description}"></p>
            </div>
        </div>
    </div>
</div>
</div>
</div>

<!-- ===== 底部购物车栏 ===== -->
<style>
.cart-panel {
    display: none; color: #333;
    background: #FFF;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.15);
    padding: 16px;
    max-height: 50vh;
    overflow-y: auto;
    margin-bottom: 8px;
}
.cart-panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #F0F0F0;
}
.cart-panel-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #F5F5F5;
}
.cart-item-info { flex: 1; min-width: 0; overflow: hidden; }
.cart-item-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-item-price { color: #E9482E; font-size: 0.82rem; }
.cart-panel-item:last-child { border-bottom: none; }
.cart-item-img {
    width: 48px; height: 48px; border-radius: 8px;
    background: #FFF8E1; display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; flex-shrink: 0;
}
.cart-qty-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid #DDD; background: #FFF;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; cursor: pointer; transition: all 0.15s;
    color: #333; line-height: 1;
}
.cart-qty-btn:hover { border-color: var(--yellow-dark); background: var(--yellow-light); }
.cart-qty-btn:active { transform: scale(0.92); }
.cart-bar-main {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; cursor: pointer;
    background: #333; border-radius: 14px; margin: 8px;
    transition: background 0.2s;
}
.cart-bar-main:hover { background: #444; }
</style>

<!-- 迷你购物车浮标（非点菜Tab时显示） -->
<div class="d-lg-none position-fixed" id="miniCart" style="bottom:60px;left:16px;z-index:1028;display:none">
    <div class="btn btn-warning rounded-circle shadow-lg d-flex align-items-center justify-content-center position-relative"
         style="width:48px;height:48px;font-size:1.3rem" onclick="document.getElementById('shopTabs').querySelector('[href=\\'#tabMenu\\']').click()">
        <i class="bi bi-cart3"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="miniCount" style="font-size:0.6rem">0</span>
    </div>
</div>

<div class="bottom-cart-bar" id="bottomCart" style="background:transparent">
    <!-- 展开的商品面板 -->
    <div class="cart-panel" id="cartExpandPanel">
        <div class="cart-panel-header">
            <span class="fw-bold fs-6">🛒 购物车</span>
            <button class="btn btn-sm btn-outline-danger py-0 px-2" id="clearCartBtn" style="font-size:0.75rem">
                <i class="bi bi-trash"></i> 清空
            </button>
        </div>
        <div id="cartExpandItems"></div>
    </div>
    <div class="cart-bar-main" id="cartBarRow">
        <div class="d-flex align-items-center gap-2 text-white">
            <div class="position-relative">
                <i class="bi bi-cart3 fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="barCount" style="font-size:0.65rem">0</span>
            </div>
            <span class="fw-bold fs-6">¥<span id="barTotal">0.00</span></span>
        </div>
        <div class="d-flex align-items-center gap-3">
            <small class="text-white-50">配送 ¥<span th:text="${merchant.deliveryFee}">3</span></small>
            <button class="btn-checkout" id="barCheckout" data-bs-toggle="modal" data-bs-target="#checkoutModal"
                    th:attr="data-min=${merchant.minOrderAmount}" disabled>
                去结算
            </button>
        </div>
    </div>
</div>

<!-- ===== 结算 Modal ===== -->
<div class="modal fade" id="checkoutModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h6 class="modal-title">确认订单</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div id="checkoutItems" class="mb-2"></div>
                <div class="d-flex justify-content-between small border-top pt-2">
                    <span>配送费</span><span>¥<span th:text="${merchant.deliveryFee}">3</span></span>
                </div>
                <div class="d-flex justify-content-between small text-muted mt-1">
                    <span><i class="bi bi-truck"></i> 预计送达</span>
                    <span class="fw-bold" style="color:var(--yellow-dark)">约 30-45 分钟</span>
                </div>
                <!-- 优惠券 -->
                <div class="d-flex justify-content-between align-items-center mt-2">
                    <h6 class="small fw-bold mb-0"><i class="bi bi-ticket-perforated"></i> 优惠券
                        <span class="badge bg-danger" id="couponBadge" th:text="${couponCount}">0</span>
                    </h6>
                    <small class="text-danger fw-bold" id="couponDiscount" style="display:none"></small>
                </div>
                <div id="couponSelection" class="small mb-1 mt-1"></div>
                <div class="d-flex justify-content-between fw-bold mt-1 border-top pt-2">
                    <span>合计</span><span class="text-danger">¥<span id="modalTotal">0</span></span>
                </div>
                <h6 class="small fw-bold"><i class="bi bi-geo-alt"></i> 收货地址</h6>
                <div id="addressSelection" class="small"></div>
                <!-- 快速新增地址 -->
                <button class="btn btn-outline-warning btn-sm w-100 mt-2" type="button" data-bs-toggle="collapse" data-bs-target="#quickAddAddr">
                    <i class="bi bi-plus-lg"></i> 新增收货地址
                </button>
                <div class="collapse mt-2" id="quickAddAddr">
                    <div class="row g-1">
                        <div class="col-6"><input class="form-control form-control-sm" id="qaName" placeholder="收货人"></div>
                        <div class="col-6"><input class="form-control form-control-sm" id="qaPhone" placeholder="手机号"></div>
                        <div class="col-12"><input class="form-control form-control-sm" id="qaAddr" placeholder="详细地址"></div>
                        <div class="col-12">
                            <button class="btn btn-warning btn-sm w-100" id="saveQuickAddr" type="button">
                                <i class="bi bi-check-lg"></i> 保存并使用
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <small class="text-muted me-auto">余额: ¥<span th:text="${user.balance}">0</span></small>
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-warning btn-sm fw-bold" id="submitOrderBtn">提交订单</button>
            </div>
        </div>
    </div>
</div>

<form th:action="@{/consumer/order/submit}" method="post" id="checkoutForm" style="display:none">
    <input type="hidden" name="merchantId" th:value="${merchant.id}">
    <input type="hidden" name="addressId" id="checkoutAddressId">
    <input type="hidden" name="cartData" id="checkoutCartData">
    <input type="hidden" name="totalAmount" id="checkoutTotalAmount">
    <input type="hidden" name="couponId" id="checkoutCouponId" value="0">
</form>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/consumer-nav :: bottom-nav}"></th:block>

<script>
(function() {
    var mid = [[${merchant.id}]];
    var CART_KEY = 'waimai_merchant_' + mid;
    function load() { return JSON.parse(localStorage.getItem(CART_KEY) || '{}'); }
    function save(c) { localStorage.setItem(CART_KEY, JSON.stringify(c)); }
    function tqty(c) { var t=0; for(var k in c) t+=c[k].quantity; return t; }
    function tprc(c) { var t=0; for(var k in c) t+=c[k].price*c[k].quantity; return t; }

    var cart = load();
    var renderTimer = null;

    function render() {
        clearTimeout(renderTimer);
        renderTimer = setTimeout(function() { _doRender(); }, 60);
    }

    function _doRender() {
        var q=tqty(cart), p=tprc(cart), h='', badgeH='';
        for(var id in cart) {
            var it=cart[id]; if(it.quantity<=0) continue;
            h+='<div class="cart-panel-item">'+
                '<div class="cart-item-img">🍽️</div>'+
                '<div class="cart-item-info">'+
                '<div class="cart-item-name">'+it.name+'</div>'+
                '<div class="cart-item-price">单价 ¥'+it.price.toFixed(2)+'</div></div>'+
                '<div class="d-flex align-items-center gap-2">'+
                '<button class="cart-qty-btn cart-dec" data-id="'+id+'">−</button>'+
                '<span class="fw-bold small" style="min-width:22px;text-align:center">'+it.quantity+'</span>'+
                '<button class="cart-qty-btn cart-inc" data-id="'+id+'">+</button></div>'+
                '<span class="text-danger fw-bold small" style="min-width:55px;text-align:right">¥'+(it.price*it.quantity).toFixed(2)+'</span></div>';
        }
        document.getElementById('cartExpandItems').innerHTML=h||'<small class="text-white-50">购物车为空</small>';
        document.getElementById('barCount').textContent=q;
        document.getElementById('barTotal').textContent=p.toFixed(2);
        document.getElementById('bottomCart').style.display='block';
        document.getElementById('barCheckout').disabled=q===0;
        if(q===0) document.getElementById('barCheckout').textContent='购物车为空'; else document.getElementById('barCheckout').textContent='去结算';
        updateCartVisibility();
        // 更新商品按钮上的数量角标
        document.querySelectorAll('.qty-badge').forEach(function(b){b.remove();});
        for(var id in cart){
            var btn=document.querySelector('.add-to-cart-btn[data-id="'+id+'"]');
            if(btn&&cart[id].quantity>0){
                var b=document.createElement('span');
                b.className='qty-badge'; b.textContent=cart[id].quantity;
                b.style.cssText='position:absolute;top:-6px;right:-6px;background:var(--red);color:#FFF;border-radius:50%;width:18px;height:18px;font-size:0.65rem;display:flex;align-items:center;justify-content:center;font-weight:700';
                btn.style.position='relative'; btn.appendChild(b);
            }
        }
        updateCheckout(p);
    }
    function updateCheckout(total) {
        var parts=[], ih='';
        for(var id in cart){ if(cart[id].quantity>0) { parts.push(id+':'+cart[id].quantity);
            ih+='<div class="d-flex justify-content-between align-items-center small py-1">'+
                '<span>'+cart[id].name+' × '+cart[id].quantity+'</span>'+
                '<span>¥'+(cart[id].price*cart[id].quantity).toFixed(2)+'</span></div>'; } }
        document.getElementById('checkoutCartData').value=parts.join(',');
        document.getElementById('checkoutTotalAmount').value=total.toFixed(2);
        document.getElementById('checkoutItems').innerHTML=ih||'<p class="text-muted small">购物车为空</p>';
        document.getElementById('modalTotal').textContent=total.toFixed(2);
    }

    // 加购 + 飞入动画（全局事件委托）
    document.addEventListener('click', function(e) {
        var btn=e.target.closest('.add-to-cart-btn'); if(!btn) return;
        e.preventDefault();
        var id=btn.dataset.id;
        if(!cart[id]) cart[id]={name:btn.dataset.name,price:parseFloat(btn.dataset.price),quantity:0};
        cart[id].quantity++; save(cart); render();

        // 飞入动画（固定终点避免首次加购时 barCount 尚未渲染导致飞偏）
        var existing=document.querySelectorAll('.fly-clone');
        if(existing.length>2){ existing[0].remove(); }
        var br=btn.getBoundingClientRect();
        var tx=60, ty=window.innerHeight-75;
        var dot=document.createElement('div');
        dot.className='fly-clone';
        dot.style.cssText='position:fixed;z-index:9999;left:'+br.left+'px;top:'+br.top+'px;width:22px;height:22px;background:var(--yellow);border-radius:50%;transition:all 0.5s cubic-bezier(0.2,0.8,0.3,1);opacity:0.9;pointer-events:none';
        document.body.appendChild(dot);
        requestAnimationFrame(function(){
            dot.style.left=tx+'px';dot.style.top=ty+'px';dot.style.opacity='0.2';dot.style.transform='scale(0.3)';
        });
        setTimeout(function(){ if(dot.parentNode) dot.remove(); },520);
    });

    // 分类切换
    document.querySelectorAll('.category-link').forEach(function(l) {
        l.addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelectorAll('.category-link').forEach(function(x){x.classList.remove('active','fw-bold');});
            this.classList.add('active','fw-bold');
            fetch('/consumer/merchant/'+mid+'/category/'+this.dataset.categoryId)
                .then(function(r){return r.json();})
                .then(function(ps){
                    var h='';
                    ps.forEach(function(p){
                        var dis=p.status==='下架'||p.stock<=0;
                        h+='<div class="card product-card mb-2 shadow-sm border-0'+(dis?' sold-out':'')+'"><div class="card-body p-2"><div class="d-flex">'+
                            '<div class="rounded-3 bg-light d-flex align-items-center justify-content-center me-2 flex-shrink-0 overflow-hidden" style="width:80px;height:80px">'+
                            (p.image?'<img src="'+p.image+'" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'"><span style="font-size:2rem;display:none">🍽️</span>':'<span style="font-size:2rem">🍽️</span>')+'</div>'+
                            '<div class="flex-grow-1 min-w-0"><h6 class="mb-1 fw-bold">'+p.name+'</h6>'+
                            (p.description?'<small class="text-muted d-block text-truncate">'+p.description+'</small>':'')+
                            '<small class="text-muted">月售'+p.sales+'</small>'+
                            '<div class="d-flex justify-content-between align-items-center mt-1">'+
                            '<span class="fw-bold text-danger">¥'+p.price.toFixed(2)+'</span>'+
                            '<button class="btn btn-warning btn-sm rounded-pill px-3 add-to-cart-btn" data-id="'+p.id+'" data-name="'+p.name+'" data-price="'+p.price+'"'+(dis?' disabled':'')+'>'+
                            '<i class="bi bi-plus"></i></button></div></div></div></div></div>';
                    });
                    document.getElementById('productList').innerHTML=h||'<div class="text-center py-4 text-muted"><p>暂无商品</p></div>';
                    // AJAX 加载后补上数量角标
                    setTimeout(function(){ render(); }, 50);
                });
        });
    });

    // 购物车展开面板加减按钮（全局委托）
    document.addEventListener('click', function(e) {
        var btn=e.target.closest('.cart-dec, .cart-inc'); if(!btn) return;
        e.stopPropagation();
        var id=btn.dataset.id; if(!cart[id]) return;
        if(btn.classList.contains('cart-dec')) {
            cart[id].quantity--;
            if(cart[id].quantity<=0) delete cart[id];
        } else { cart[id].quantity++; }
        save(cart); render();
    });

    // 清空购物车
    document.getElementById('clearCartBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        showConfirm('确定清空购物车吗？', function(){ cart={}; save(cart); render(); });
    });

    // Tab切换：点菜显示完整购物车栏，其他Tab显示迷你图标
    var onMenuTab = true;
    document.getElementById('shopTabs').addEventListener('click', function(e){
        var tab = e.target.closest('[data-bs-toggle=\"tab\"]');
        if(!tab) return;
        setTimeout(function(){
            onMenuTab = tab.getAttribute('href') === '#tabMenu';
            updateCartVisibility();
        }, 50);
    });
    function updateCartVisibility(){
        var bar = document.getElementById('bottomCart');
        var mini = document.getElementById('miniCart');
        var q = tqty(cart);
        if(onMenuTab){
            bar.style.display='block';
            mini.style.display='none';
        } else {
            bar.style.display='none';
            mini.style.display=q>0?'block':'none';
            document.getElementById('miniCount').textContent=q;
        }
    }

    // 底部购物车栏点击展开/收起
    var cartExpanded = false;
    document.getElementById('cartBarRow').addEventListener('click', function(e) {
        if (e.target.closest('button')||e.target.closest('#barCheckout')) return;
        cartExpanded=!cartExpanded;
        document.getElementById('cartExpandPanel').style.display=cartExpanded?'block':'none';
        this.style.borderRadius=cartExpanded?'0':'14px';
    });

    // 评价筛选
    document.querySelectorAll('#tabReviews .badge').forEach(function(b) {
        b.style.cursor='pointer';
        b.addEventListener('click', function() {
            document.querySelectorAll('#tabReviews .badge').forEach(function(x){x.className=x.className.replace('bg-warning text-dark','bg-light text-muted');});
            this.className=this.className.replace('bg-light text-muted','bg-warning text-dark');
            var filter=this.textContent.trim();
            document.querySelectorAll('.review-card').forEach(function(card){
                if(filter.includes('全部')) card.style.display='';
                else if(filter.includes('好评')&&!card.querySelector('.star-rating').textContent.includes('★★★★★')) card.style.display='none';
                else card.style.display='';
            });
        });
    });

    // 快速新增地址
    document.getElementById('saveQuickAddr').addEventListener('click', function() {
        var n=document.getElementById('qaName').value.trim();
        var p=document.getElementById('qaPhone').value.trim();
        var a=document.getElementById('qaAddr').value.trim();
        if(!n||!p||!a){showToast('请填写完整地址信息','error');return;}
        var fd=new FormData();
        fd.append('receiverName',n);fd.append('receiverPhone',p);
        fd.append('detailAddress',a);
        fd.append('province','');fd.append('city','');fd.append('district','');
        fd.append('isDefault','false');
        fetch('/consumer/address/add',{method:'POST',body:new URLSearchParams(fd)})
            .then(function(){showToast('地址已添加','success');
                document.getElementById('qaName').value='';document.getElementById('qaPhone').value='';
                document.getElementById('qaAddr').value='';
                bootstrap.Collapse.getInstance(document.getElementById('quickAddAddr')).hide();
                // 重新加载地址列表
                fetch('/consumer/address').then(function(r){return r.text();}).then(function(html){
                    var cards=new DOMParser().parseFromString(html,'text/html').querySelectorAll('.address-row');
                    var ctr=document.getElementById('addressSelection'),lh='<div class=\"list-group list-group-flush\">';
                    cards.forEach(function(cd){
                        lh+='<label class=\"list-group-item small d-flex align-items-center\" style=\"cursor:pointer\"><input type=\"radio\" name=\"addressId\" value=\"'+cd.getAttribute('data-id')+'\" class=\"form-check-input me-2\"'+(cd.getAttribute('data-default')==='true'?' checked':'')+'>'+cd.getAttribute('data-summary')+(cd.getAttribute('data-default')==='true'?'<span class=\"badge bg-warning text-dark ms-1\">默认</span>':'')+'</label>';
                    });
                    ctr.innerHTML=lh+'</div>';
                });
            })
            .catch(function(){showToast('添加失败','error');});
    });

    // 结算弹窗
    document.getElementById('checkoutModal').addEventListener('show.bs.modal', function() {
        updateCheckout(tprc(cart));
        // 加载优惠券
        var total = tprc(cart);
        fetch('/consumer/coupons')
            .then(function(r){return r.json();})
            .then(function(coupons){
                var ch=''; var hasValid=false;
                // 排序：可用在前，不可用在后
                coupons.sort(function(a,b){
                    var va=total>=a.minOrder, vb=total>=b.minOrder;
                    return va===vb?0:va?-1:1;
                });
                coupons.forEach(function(c){
                    var valid = total >= c.minOrder;
                    ch+='<label class="list-group-item d-flex align-items-center py-2 px-2" style="font-size:0.9rem;cursor:pointer;'+
                        (!valid?'opacity:0.45;background:#F5F5F5;':'')+'">'+
                        '<input type="radio" name="couponId" value="'+c.id+'" data-amount="'+c.amount+'" class="form-check-input me-2"'+
                        (!valid?' disabled':'')+'>'+
                        '<span class="flex-grow-1">'+c.name+' <span class="text-danger fw-bold">-¥'+c.amount+'</span>'+
                        (c.minOrder>0?'<span class="text-muted"> 满¥'+c.minOrder+'</span>':'')+
                        (!valid?' <span class="text-muted">(未满)</span>':'')+'</span></label>';
                    if(valid) hasValid=true;
                });
                document.getElementById('couponSelection').innerHTML=ch||'<small class="text-muted">暂无可用优惠券</small>';
                // 优惠券选中后更新总数和显示折扣
                document.querySelectorAll('input[name="couponId"]').forEach(function(inp){
                    inp.addEventListener('change', function(){
                        var disc=parseFloat(this.dataset.amount)||0;
                        var nt=total-disc;
                        document.getElementById('modalTotal').textContent=Math.max(0,nt).toFixed(2);
                        var cd=document.getElementById('couponDiscount');
                        cd.style.display=disc>0?'inline':'none';
                        cd.textContent='-¥'+disc.toFixed(2);
                    });
                });
            }).catch(function(){});
        // 地址加载
        fetch('/consumer/address').then(function(r){return r.text();}).then(function(html) {
            var cards=new DOMParser().parseFromString(html,'text/html').querySelectorAll('.address-row');
            var ctr=document.getElementById('addressSelection');
            if(!cards||cards.length===0){ctr.innerHTML='<div class="alert alert-warning py-2">请先<a href="/consumer/address">添加地址</a></div>';return;}
            var lh='<div class="list-group list-group-flush">';
            cards.forEach(function(cd){
                lh+='<label class="list-group-item small d-flex align-items-center" style="cursor:pointer">'+
                    '<input type="radio" name="addressId" value="'+cd.getAttribute('data-id')+'" class="form-check-input me-2"'+(cd.getAttribute('data-default')==='true'?' checked':'')+'>'+
                    cd.getAttribute('data-summary')+(cd.getAttribute('data-default')==='true'?'<span class="badge bg-warning text-dark ms-1">默认</span>':'')+'</label>';
            });
            ctr.innerHTML=lh+'</div>';
        }).catch(function(){document.getElementById('addressSelection').innerHTML='<div class="alert alert-warning py-2">加载失败</div>';});
    });

    // 提交订单
    document.getElementById('submitOrderBtn').addEventListener('click', function() {
        var sel=document.querySelector('input[name="addressId"]:checked');
        var price=tprc(cart);
        if(!sel){showToast('请选择收货地址','error');return;}
        if(tqty(cart)===0){showToast('购物车为空','error');return;}
        if(price<parseFloat(document.getElementById('barCheckout').dataset.min||0)){showToast('未达到起送价','error');return;}
        document.getElementById('checkoutAddressId').value=sel.value;
        var ce=document.querySelector('input[name="couponId"]:checked');
        document.getElementById('checkoutCouponId').value=ce?ce.value:'0';
        localStorage.removeItem(CART_KEY);
        document.getElementById('checkoutForm').submit();
    });

    render();
})();
</script>
</body>
</html>

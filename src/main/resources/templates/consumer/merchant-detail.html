<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${merchant.shopName} + ' — 美味外卖'">商家详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <!-- DEBUG: 购物车隔离指示器 -->
    <div id="cartDebug" class="alert alert-info py-1 px-3 small mb-2 d-flex align-items-center gap-2" style="opacity:0.85">
        <i class="bi bi-cart3"></i>
        <span id="cartDebugInfo">加载中...</span>
    </div>
    <a th:href="@{/consumer/index}" class="btn btn-outline-warning btn-sm mb-3">
        <i class="bi bi-arrow-left"></i> 返回商家列表
    </a>

    <!-- 商家信息 -->
    <div class="card shadow-sm mb-3">
        <div class="card-body p-4">
            <div class="d-flex flex-wrap align-items-center">
                <div class="rounded-3 d-flex align-items-center justify-content-center me-3"
                     style="width:80px;height:80px;background:linear-gradient(135deg,#ffd101,#ffb800);min-width:80px">
                    <span class="text-white fw-bold fs-4" th:text="${#strings.substring(merchant.shopName,0,2)}">美味</span>
                </div>
                <div class="flex-grow-1">
                    <h4 class="fw-bold mb-1" th:text="${merchant.shopName}">店铺名称</h4>
                    <div class="mb-1">
                        <span class="text-warning me-1"><i class="bi bi-star-fill"></i></span>
                        <span class="fw-bold text-warning" th:text="${merchant.rating}">4.5</span>
                        <small class="text-muted ms-2">月售 <span th:text="${merchant.monthlySales}">0</span></small>
                    </div>
                    <div class="d-flex flex-wrap gap-2 small">
                        <span class="badge bg-light text-dark">
                            <i class="bi bi-truck"></i> 配送费 ¥<span th:text="${merchant.deliveryFee}">3</span>
                        </span>
                        <span class="badge bg-light text-dark">
                            <i class="bi bi-cart"></i> 起送 ¥<span th:text="${merchant.minOrderAmount}">15</span>
                        </span>
                        <span class="badge" th:classappend="${merchant.status=='营业中'} ? 'bg-success' : 'bg-secondary'"
                              th:text="${merchant.status}">营业中</span>
                    </div>
                </div>
            </div>
            <p class="card-text text-muted mt-2 mb-0" th:text="${merchant.description}"></p>
        </div>
    </div>

    <div class="row">
        <!-- 左侧分类导航 -->
        <div class="col-md-3 col-lg-2 mb-3">
            <div class="card shadow-sm sticky-top" style="top:80px;z-index:1010">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-tags"></i> 商品分类</h6>
                </div>
                <div class="list-group list-group-flush" id="categoryNav">
                    <a th:each="c : ${categories}" href="#"
                       class="list-group-item list-group-item-action category-link"
                       th:data-category-id="${c.id}"
                       th:classappend="${c.id == currentCategoryId} ? 'active bg-warning border-warning text-dark' : ''">
                        <span th:text="${c.name}">分类名</span>
                    </a>
                </div>
                <div th:if="${#lists.isEmpty(categories)}" class="card-body text-center text-muted py-3">
                    <small>暂无分类</small>
                </div>
            </div>
        </div>

        <!-- 商品列表 -->
        <div class="col-md-9 col-lg-7 mb-3" id="productList">
            <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 text-muted">
                <i class="bi bi-box" style="font-size:3rem"></i>
                <p class="mt-2">该分类暂无商品</p>
            </div>
            <div th:each="p : ${products}" class="card product-card mb-2 shadow-sm">
                <div class="card-body p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center flex-grow-1">
                            <div class="rounded-3 bg-light d-flex align-items-center justify-content-center me-3"
                                 style="width:64px;height:64px;min-width:64px;overflow:hidden">
                                <span class="fs-3">🍽️</span>
                            </div>
                            <div>
                                <h6 class="mb-1 fw-bold" th:text="${p.name}">商品名称</h6>
                                <small th:if="${p.description != null and !p.description.isEmpty()}"
                                       class="text-muted" th:text="${p.description}">描述</small>
                                <div class="small text-muted">
                                    月售 <span th:text="${p.sales}">0</span>
                                    <span class="ms-2 text-danger" th:if="${p.stock <= 10}">
                                        仅剩 <span th:text="${p.stock}">0</span> 份
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="text-end ms-3" style="min-width:100px">
                            <div class="fw-bold text-danger mb-1 fs-5">¥<span th:text="${p.price}">0.00</span></div>
                            <button class="btn btn-warning btn-sm add-to-cart-btn"
                                    th:attr="data-id=${p.id},data-name=${p.name},data-price=${p.price},data-image=${p.image}"
                                    th:disabled="${p.status == '下架' or p.stock <= 0}">
                                <i class="bi bi-cart-plus"></i>
                                <span th:if="${p.status == '下架'}">已下架</span>
                                <span th:unless="${p.status == '下架'}" th:if="${p.stock <= 0}">售罄</span>
                                <span th:unless="${p.status == '下架' or p.stock <= 0}">加入</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 桌面端购物车 -->
        <div class="col-lg-3 d-none d-lg-block">
            <div class="card shadow-sm sticky-top" style="top:80px;z-index:1010">
                <div class="card-header bg-warning bg-opacity-10">
                    <h6 class="mb-0 fw-bold">
                        <i class="bi bi-cart3"></i> 购物车
                        <span class="badge bg-warning text-dark ms-1" id="cartCountDesk">0</span>
                    </h6>
                </div>
                <div class="card-body p-2">
                    <div id="cartEmptyDesk" class="text-center py-3 text-muted">
                        <i class="bi bi-cart3" style="font-size:2rem"></i>
                        <p class="mb-0 small">购物车是空的</p>
                    </div>
                    <div id="cartItemsDesk" class="cart-items-list" style="max-height:300px;overflow-y:auto"></div>
                </div>
                <div class="card-footer bg-white" id="cartFooterDesk" style="display:none">
                    <div class="d-flex justify-content-between mb-2">
                        <small>合计：</small>
                        <strong class="text-danger">¥<span id="cartTotalDesk">0.00</span></strong>
                    </div>
                    <button class="btn btn-warning btn-sm w-100 fw-bold" data-bs-toggle="modal"
                            data-bs-target="#checkoutModal">
                        <i class="bi bi-bag-check"></i> 去结算
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 移动端购物车按钮 -->
<div class="d-lg-none position-fixed bottom-0 end-0 m-3" style="z-index:1020">
    <button class="btn btn-warning btn-lg rounded-circle shadow-lg position-relative"
            data-bs-toggle="modal" data-bs-target="#checkoutModal">
        <i class="bi bi-cart3 fs-4"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              id="mobileCartBadge" style="display:none">0</span>
    </button>
</div>

<!-- 结算 Modal -->
<div class="modal fade" id="checkoutModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-bag-check"></i> 确认订单</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <h6 class="fw-bold mb-2">商品清单</h6>
                <div id="checkoutItems" class="mb-3">
                    <p class="text-muted">请先添加商品到购物车</p>
                </div>
                <div class="d-flex justify-content-between border-top pt-2 mb-3">
                    <span>配送费</span>
                    <span class="text-muted">¥<span id="checkoutDeliveryFee" th:text="${merchant.deliveryFee}">3.00</span></span>
                </div>
                <div class="d-flex justify-content-between fw-bold fs-5">
                    <span>合计</span>
                    <span class="text-danger">¥<span id="modalTotal">0.00</span></span>
                </div>
                <hr>
                <h6 class="fw-bold mb-2"><i class="bi bi-geo-alt"></i> 收货地址</h6>
                <div id="addressSelection" class="mb-3">
                    <p class="text-muted small">正在加载地址...</p>
                </div>
                <a th:href="@{/consumer/address}" class="btn btn-outline-warning btn-sm" target="_blank">
                    <i class="bi bi-plus-lg"></i> 管理收货地址
                </a>
            </div>
            <div class="modal-footer">
                <small class="text-muted me-auto">余额：¥<span th:text="${user.balance}">0.00</span></small>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-warning fw-bold px-4" id="submitOrderBtn"
                        th:attr="data-min-order=${merchant.minOrderAmount}">
                    <i class="bi bi-check-lg"></i> 提交订单
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 隐藏的提交表单 -->
<form th:action="@{/consumer/order/submit}" method="post" id="checkoutForm" style="display:none">
    <input type="hidden" name="merchantId" th:value="${merchant.id}">
    <input type="hidden" name="addressId" id="checkoutAddressId">
    <input type="hidden" name="cartData" id="checkoutCartData">
    <input type="hidden" name="totalAmount" id="checkoutTotalAmount">
</form>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>

<script th:inline="javascript">
(function() {
    // ===== 商家专属购物车（完全独立，不依赖 main.js） =====
    var mid = [[${merchant.id}]];
    var CART_KEY = 'waimai_merchant_' + mid;

    function load()  { return JSON.parse(localStorage.getItem(CART_KEY) || '{}'); }
    function save(c) { localStorage.setItem(CART_KEY, JSON.stringify(c)); }

    function totalQty(c) { var t=0; for(var k in c) t+=c[k].quantity; return t; }
    function totalPrice(c) { var t=0; for(var k in c) t+=c[k].price*c[k].quantity; return t; }

    function renderCart(c) {
        var qty = totalQty(c), price = totalPrice(c), html = '';
        for (var id in c) {
            var it = c[id]; if (it.quantity <= 0) continue;
            html += '<div class="d-flex justify-content-between align-items-center mb-1 py-1 border-bottom small">'+
                '<div style="flex:1;min-width:0"><div class="fw-bold text-truncate">'+it.name+'</div>'+
                '<div class="text-danger">¥'+it.price.toFixed(2)+'</div></div>'+
                '<div class="d-flex align-items-center ms-1">'+
                '<button class="btn btn-sm btn-outline-secondary py-0 px-1 cart-dec" data-id="'+id+'">−</button>'+
                '<span class="mx-1">'+it.quantity+'</span>'+
                '<button class="btn btn-sm btn-outline-secondary py-0 px-1 cart-inc" data-id="'+id+'">+</button>'+
                '</div></div>';
        }
        document.getElementById('cartItemsDesk').innerHTML = html;
        document.getElementById('cartCountDesk').textContent = qty;
        document.getElementById('cartTotalDesk').textContent = price.toFixed(2);
        document.getElementById('cartEmptyDesk').style.display = qty===0?'block':'none';
        document.getElementById('cartFooterDesk').style.display = qty===0?'none':'block';
        var b = document.getElementById('mobileCartBadge'); b.textContent = qty; b.style.display = qty===0?'none':'block';
        updateCheckout(c, price);
        updateDebug(c);
    }

    function updateCheckout(c, total) {
        var parts = [];
        for (var id in c) { if (c[id].quantity>0) parts.push(id+':'+c[id].quantity); }
        document.getElementById('checkoutCartData').value = parts.join(',');
        document.getElementById('checkoutTotalAmount').value = total.toFixed(2);
        var ih = '';
        for (var id in c) {
            var it = c[id]; if (it.quantity<=0) continue;
            ih += '<div class="d-flex justify-content-between small"><span>'+it.name+' × '+it.quantity+'</span><span>¥'+(it.price*it.quantity).toFixed(2)+'</span></div>';
        }
        document.getElementById('checkoutItems').innerHTML = ih || '<p class="text-muted">购物车为空</p>';
        document.getElementById('modalTotal').textContent = total.toFixed(2);
    }

    function renderProducts(products) {
        var el = document.getElementById('productList');
        if (!products || products.length===0) {
            el.innerHTML = '<div class="text-center py-4 text-muted"><p>该分类暂无商品</p></div>'; return;
        }
        var h = '';
        products.forEach(function(p) {
            var dis = p.status==='下架'||p.stock<=0;
            var bt = dis ? (p.status==='下架'?'已下架':'售罄') : '<i class="bi bi-cart-plus"></i> 加入';
            h += '<div class="card product-card mb-2 shadow-sm"><div class="card-body p-3">'+
                '<div class="d-flex justify-content-between align-items-center">'+
                '<div class="d-flex align-items-center flex-grow-1">'+
                '<div class="rounded-3 bg-light d-flex align-items-center justify-content-center me-3" style="width:64px;height:64px;min-width:64px"><span style="font-size:1.8rem">🍽️</span></div>'+
                '<div><h6 class="mb-1 fw-bold">'+p.name+'</h6>'+
                (p.description?'<small class="text-muted">'+p.description+'</small>':'')+
                '<div class="small text-muted">月售 '+p.sales+(p.stock<=10?'<span class="ms-2 text-danger">仅剩 '+p.stock+' 份</span>':'')+'</div>'+
                '</div></div>'+
                '<div class="text-end ms-3" style="min-width:100px">'+
                '<div class="fw-bold text-danger mb-1 fs-5">¥'+p.price.toFixed(2)+'</div>'+
                '<button class="btn btn-warning btn-sm add-to-cart-btn" data-id="'+p.id+'" data-name="'+p.name+'" data-price="'+p.price+'" data-image="'+(p.image||'')+'"'+(dis?' disabled':'')+'>'+bt+'</button>'+
                '</div></div></div></div>';
        });
        el.innerHTML = h;
    }

    // ===== 调试指示器 =====
    function updateDebug(c) {
        var q = totalQty(c), p = totalPrice(c);
        document.getElementById('cartDebugInfo').innerHTML =
            '<strong>商店ID:</strong> ' + mid +
            ' | <strong>localStorage key:</strong> <code>' + CART_KEY + '</code>' +
            ' | <strong>商品数:</strong> ' + q +
            ' | <strong>金额:</strong> ¥' + p.toFixed(2) +
            ' | <span style="color:' + (q>0?'green':'#999') + '">' + (q>0?'✓ 已加载 '+q+' 件商品':'○ 购物车为空') + '</span>';
    }

    // ===== DOM 就绪 =====
    var cart = load();

    // 购物车数量加减（事件委托）
    document.getElementById('cartItemsDesk').addEventListener('click', function(e) {
        var btn = e.target.closest('button'); if (!btn) return;
        var id = btn.dataset.id; if (!cart[id]) return;
        if (btn.classList.contains('cart-dec')) { cart[id].quantity--; if (cart[id].quantity<=0) delete cart[id]; }
        else if (btn.classList.contains('cart-inc')) { cart[id].quantity++; }
        save(cart); renderCart(cart);
    });

    // 加购按钮（全局事件委托）
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('.add-to-cart-btn'); if (!btn) return;
        e.preventDefault();
        var id = btn.dataset.id;
        if (!cart[id]) cart[id] = { name:btn.dataset.name, price:parseFloat(btn.dataset.price), image:btn.dataset.image||'', quantity:0 };
        cart[id].quantity++; save(cart); renderCart(cart);
        showToast(btn.dataset.name+' 已加入购物车','success',1800);
        btn.classList.add('btn-success'); btn.innerHTML='<i class="bi bi-check"></i> 已加';
        setTimeout(function(){ btn.classList.remove('btn-success'); btn.innerHTML='<i class="bi bi-cart-plus"></i> 加入'; },800);
    });

    // 分类切换
    document.querySelectorAll('.category-link').forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            var catId = this.dataset.categoryId;
            document.querySelectorAll('.category-link').forEach(function(l){ l.classList.remove('active','bg-warning','border-warning','text-dark'); });
            this.classList.add('active','bg-warning','border-warning','text-dark');
            fetch('/consumer/merchant/'+mid+'/category/'+catId)
                .then(function(r){ return r.json(); })
                .then(function(ps){ renderProducts(ps); })
                .catch(function(){ document.getElementById('productList').innerHTML='<div class="text-center py-4 text-muted"><p>加载失败，请重试</p></div>'; });
        });
    });

    // 结算 Modal 地址加载
    function loadAddresses() {
        fetch('/consumer/address').then(function(r){ return r.text(); }).then(function(html){
            var cards = new DOMParser().parseFromString(html,'text/html').querySelectorAll('.address-row');
            var ctr = document.getElementById('addressSelection');
            if (!cards||cards.length===0){ ctr.innerHTML='<div class="alert alert-warning py-2 small">您还没有收货地址，请先<a href="/consumer/address" target="_blank">添加收货地址</a></div>'; return; }
            var lh = '<div class="list-group list-group-flush">';
            cards.forEach(function(cd){
                lh += '<label class="list-group-item d-flex align-items-center" style="cursor:pointer">'+
                    '<input type="radio" name="addressId" value="'+cd.getAttribute('data-id')+'" class="form-check-input me-2"'+(cd.getAttribute('data-default')==='true'?' checked':'')+'>'+
                    '<span class="small">'+cd.getAttribute('data-summary')+'</span>'+
                    (cd.getAttribute('data-default')==='true'?'<span class="badge bg-warning text-dark ms-2 small">默认</span>':'')+'</label>';
            });
            lh += '</div>'; ctr.innerHTML = lh;
        }).catch(function(){ document.getElementById('addressSelection').innerHTML='<div class="alert alert-warning py-2 small">无法加载地址</div>'; });
    }

    document.getElementById('checkoutModal').addEventListener('show.bs.modal', function(){ updateCheckout(cart,totalPrice(cart)); loadAddresses(); });

    // 提交订单
    document.getElementById('submitOrderBtn').addEventListener('click', function(){
        var sel = document.querySelector('input[name="addressId"]:checked');
        var price = totalPrice(cart);
        var min = parseFloat(this.dataset.minOrder)||0;
        if (!sel) { showToast('请选择收货地址','error'); return; }
        if (totalQty(cart)===0) { showToast('购物车为空','error'); return; }
        if (price<min) { showToast('未达到起送价 ¥'+min.toFixed(2),'error',4000); return; }
        document.getElementById('checkoutAddressId').value = sel.value;
        localStorage.removeItem(CART_KEY);
        document.getElementById('checkoutForm').submit();
    });

    // 初始渲染
    renderCart(cart);
    updateDebug(cart);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        body { padding-bottom: 80px; background: #F5F5F6; }
        .my-header {
            background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
            padding: 2rem 1.5rem 1.5rem; color: #333;
            border-radius: 0 0 24px 24px;
        }
        .my-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 700; margin-bottom: 8px;
        }
        .my-menu-item {
            display: flex; align-items: center; gap: 14px;
            padding: 16px; background: #FFF; border-radius: 12px;
            margin-bottom: 10px; text-decoration: none; color: #333;
            transition: all 0.15s;
        }
        .my-menu-item:hover { background: #FFF8E1; transform: translateX(3px); }
        .my-menu-icon {
            width: 42px; height: 42px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="my-header">
    <div class="d-flex align-items-center gap-3">
        <div class="my-avatar" th:text="${#strings.substring(user.username,0,1)}">张</div>
        <div style="color:#333">
            <h5 class="fw-bold mb-0" th:text="${user.username}">用户名</h5>
            <small>余额 ¥<span th:text="${user.balance}">0.00</span></small>
        </div>
    </div>
</div>

<div class="container px-3 pt-3" style="max-width:500px">
    <!-- 我的订单 -->
    <a th:href="@{/consumer/orders}" class="my-menu-item">
        <div class="my-menu-icon" style="background:#FFF3E0">📋</div>
        <div class="flex-grow-1"><div class="fw-bold small">我的订单</div><small class="text-muted">查看全部订单</small></div>
        <i class="bi bi-chevron-right text-muted"></i>
    </a>

    <!-- 收货地址 -->
    <a th:href="@{/consumer/address}" class="my-menu-item">
        <div class="my-menu-icon" style="background:#E3F2FD">📍</div>
        <div class="flex-grow-1"><div class="fw-bold small">收货地址</div><small class="text-muted">管理收货地址</small></div>
        <i class="bi bi-chevron-right text-muted"></i>
    </a>

    <!-- 余额 -->
    <a th:href="@{/consumer/balance}" class="my-menu-item">
        <div class="my-menu-icon" style="background:#E8F5E9">💰</div>
        <div class="flex-grow-1"><div class="fw-bold small">我的余额</div>
            <small class="text-danger">¥<span th:text="${user.balance}">0.00</span></small></div>
        <i class="bi bi-chevron-right text-muted"></i>
    </a>

    <!-- 个人信息修改 -->
    <a data-bs-toggle="collapse" href="#profileEdit" class="my-menu-item">
        <div class="my-menu-icon" style="background:#F3E5F5">👤</div>
        <div class="flex-grow-1"><div class="fw-bold small">个人信息</div><small class="text-muted">修改邮箱和密码</small></div>
        <i class="bi bi-chevron-right text-muted"></i>
    </a>

    <!-- 个人信息折叠区 -->
    <div class="collapse mb-3" id="profileEdit">
        <div class="card border-0 shadow-sm" style="border-radius:12px">
            <div class="card-body p-3">
                <!-- 基本信息 -->
                <form th:action="@{/consumer/profile/update}" method="post" class="mb-3">
                    <label class="form-label small fw-bold">邮箱</label>
                    <div class="input-group input-group-sm mb-2">
                        <input type="email" name="email" class="form-control" th:value="${user.email}" placeholder="输入邮箱">
                        <button type="submit" class="btn btn-warning btn-sm">保存</button>
                    </div>
                </form>
                <!-- 改密码 -->
                <form th:action="@{/consumer/profile/password}" method="post">
                    <label class="form-label small fw-bold">修改密码</label>
                    <div class="input-group input-group-sm mb-2">
                        <input type="password" name="oldPassword" class="form-control" placeholder="原密码" required>
                    </div>
                    <div class="input-group input-group-sm mb-2">
                        <input type="password" name="newPassword" class="form-control" placeholder="新密码(6位以上)" required minlength="6">
                        <button type="submit" class="btn btn-warning btn-sm">修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 安全登出 -->
    <form th:action="@{/auth/logout}" method="post">
        <button type="submit" class="my-menu-item w-100 border-0" style="cursor:pointer">
            <div class="my-menu-icon" style="background:#FEE">🚪</div>
            <div class="flex-grow-1 text-start"><div class="fw-bold small text-danger">安全登出</div></div>
            <i class="bi bi-chevron-right text-muted"></i>
        </button>
    </form>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/consumer-nav :: bottom-nav}"></th:block>
</body>
</html>

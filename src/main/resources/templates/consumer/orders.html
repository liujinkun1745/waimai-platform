<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>body{padding-bottom:70px}</style>
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <a href="javascript:history.back()" class="back-btn mb-3">
        <i class="bi bi-chevron-left"></i> 返回
    </a>
    <h5 class="fw-bold mb-3"><i class="bi bi-receipt text-yellow"></i> 我的订单</h5>

    <!-- 状态筛选 -->
    <div class="mb-4">
        <nav class="nav nav-pills flex-wrap gap-1">
            <a class="nav-link" th:classappend="${currentStatus==null} ? 'active' : ''"
               th:href="@{/consumer/orders}">全部</a>
            <a class="nav-link" th:classappend="${currentStatus=='待接单'} ? 'active' : ''"
               th:href="@{/consumer/orders(status='待接单')}">待接单</a>
            <a class="nav-link" th:classappend="${currentStatus=='待配送'} ? 'active' : ''"
               th:href="@{/consumer/orders(status='待配送')}">待配送</a>
            <a class="nav-link" th:classappend="${currentStatus=='配送中'} ? 'active' : ''"
               th:href="@{/consumer/orders(status='配送中')}">配送中</a>
            <a class="nav-link" th:classappend="${currentStatus=='已完成'} ? 'active' : ''"
               th:href="@{/consumer/orders(status='已完成')}">已完成</a>
            <a class="nav-link" th:classappend="${currentStatus=='已取消'} ? 'active' : ''"
               th:href="@{/consumer/orders(status='已取消')}">已取消</a>
        </nav>
    </div>

    <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
        <span class="empty-icon"><i class="bi bi-inbox"></i></span>
        <p class="empty-text fw-bold">暂无订单</p>
        <p class="empty-hint">去 <a th:href="@{/consumer/index}">首页</a> 逛逛吧</p>
    </div>

    <div th:each="o,iter : ${orders}" class="card shadow-sm mb-3"
         th:style="'animation: slideUp 0.35s ease both; animation-delay: ' + ${iter.index * 0.04} + 's'"
         th:with="items=${itemsMap.get(o.id)}, step=${o.step}">

        <div class="card-header bg-white d-flex justify-content-between align-items-center py-2">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-shop text-yellow"></i>
                <span class="fw-bold small" th:text="${o.merchant.shopName}">商家</span>
                <small class="text-muted" th:text="${#temporals.format(o.createdAt,'MM-dd HH:mm')}"></small>
            </div>
            <span class="text-danger fw-bold">¥<span th:text="${o.totalAmount}">0.00</span></span>
        </div>

        <div class="card-body p-3">
            <!-- 进度步骤条 -->
            <div th:if="${o.status != '已取消'}" class="order-stepper mb-3">
                <div class="stepper-step">
                    <div class="stepper-dot" th:classappend="${step >= 0} ? 'active' : ''">
                        <span th:if="${step > 0}"><i class="bi bi-check"></i></span>
                        <span th:unless="${step > 0}">1</span>
                    </div>
                    <span class="stepper-label" th:classappend="${step == 0} ? 'active' : (${step > 0} ? 'done' : '')">待接单</span>
                </div>
                <div class="stepper-step">
                    <div class="stepper-dot" th:classappend="${step >= 1} ? 'active' : ''">
                        <span th:if="${step > 1}"><i class="bi bi-check"></i></span>
                        <span th:unless="${step > 1}">2</span>
                    </div>
                    <span class="stepper-label" th:classappend="${step == 1} ? 'active' : (${step > 1} ? 'done' : '')">待配送</span>
                </div>
                <div class="stepper-step">
                    <div class="stepper-dot" th:classappend="${step >= 2} ? 'active' : ''">
                        <span th:if="${step > 2}"><i class="bi bi-check"></i></span>
                        <span th:unless="${step > 2}">3</span>
                    </div>
                    <span class="stepper-label" th:classappend="${step == 2} ? 'active' : (${step > 2} ? 'done' : '')">配送中</span>
                </div>
                <div class="stepper-step">
                    <div class="stepper-dot" th:classappend="${step >= 3} ? 'done' : ''">
                        <span th:if="${step >= 3}"><i class="bi bi-check"></i></span>
                        <span th:unless="${step >= 3}">4</span>
                    </div>
                    <span class="stepper-label" th:classappend="${step >= 3} ? 'done' : ''">已完成</span>
                </div>
            </div>

            <!-- 已取消 -->
            <div th:if="${o.status == '已取消'}" class="stepper-cancelled mb-3">
                <div class="cancelled-dot"><i class="bi bi-x text-danger"></i></div>
                <span class="text-secondary">订单已取消</span>
            </div>

            <!-- 预计送达（配送中时显示） -->
            <div th:if="${o.status == '配送中'}" class="d-flex align-items-center gap-2 mb-2 small">
                <i class="bi bi-truck text-info"></i>
                <span>预计 <span class="fw-bold countdown-timer" style="font-size:0.85rem"
                        th:attr="data-delivery=${#temporals.format(o.estimatedDelivery, 'yyyy-MM-dd HH:mm:ss')}">
                    计算中...</span> 送达</span>
            </div>

            <!-- 商品清单 -->
            <div class="order-items">
                <div th:each="item,it : ${items}" th:if="${it.index < 3}"
                     class="d-flex justify-content-between align-items-center py-1 border-bottom border-light small">
                    <span class="text-truncate" style="max-width:60%"><span th:text="${item.productName}"></span></span>
                    <span><span class="text-muted">×<span th:text="${item.quantity}">1</span></span>
                    <span class="ms-2">¥<span th:text="${item.subtotal}">0</span></span></span>
                </div>
                <div th:if="${items != null and items.size() > 3}" class="collapse" th:attr="id='more-'+${o.id}">
                    <div th:each="item,it : ${items}" th:if="${it.index >= 3}"
                         class="d-flex justify-content-between align-items-center py-1 border-bottom border-light small">
                        <span class="text-truncate" style="max-width:60%"><span th:text="${item.productName}"></span></span>
                        <span><span class="text-muted">×<span th:text="${item.quantity}">1</span></span>
                        <span class="ms-2">¥<span th:text="${item.subtotal}">0</span></span></span>
                    </div>
                </div>
                <button th:if="${items != null and items.size() > 3}"
                        class="btn btn-link btn-sm p-0 mt-1 text-decoration-none"
                        data-bs-toggle="collapse" th:attr="data-bs-target='#more-'+${o.id},data-total=${items.size() - 3}"
                        onclick="var t=this,n=parseInt(this.dataset.total);t.textContent=t.textContent.includes('查看全部')?'收起▲':'查看全部 ('+n+'件) ▼'">
                    查看全部 (<span th:text="${items.size() - 3}">0</span>件) ▼</button>
            </div>

            <!-- 底部操作 -->
            <div class="d-flex justify-content-between align-items-end mt-2 pt-2 border-top">
                <div>
                    <small class="text-muted" th:text="${o.orderNo}"></small>
                    <div class="small text-muted text-truncate" style="max-width:220px" th:text="${o.addressSnapshot}"></div>
                </div>
                <div class="d-flex gap-1 flex-shrink-0">
                    <a th:href="@{/consumer/order/{id}(id=${o.id})}" class="btn btn-outline-warning btn-sm py-0 px-2">
                        <i class="bi bi-eye"></i>
                    </a>
                    <form th:if="${o.status=='待接单'}" th:action="@{/consumer/order/cancel/{id}(id=${o.id})}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm py-0 px-2"
                                onclick="showConfirm('确定取消订单吗？',function(){this.closest('form').submit()}.bind(this));return false;">
                            <i class="bi bi-x-circle"></i> 取消
                        </button>
                    </form>
                    <form th:if="${o.status=='配送中'}" th:action="@{/consumer/order/confirm/{id}(id=${o.id})}" method="post">
                        <button type="submit" class="btn btn-warning btn-sm py-0 px-2 btn-pulse">
                            <i class="bi bi-check-circle"></i> 确认收货
                        </button>
                    </form>
                    <!-- 已完成订单：评价提示 -->
                    <th:block th:if="${o.status == '已完成'}">
                        <span th:if="${reviewedMap.get(o.id)}" class="badge bg-success py-1 px-2"><i class="bi bi-check-lg"></i> 已评价</span>
                        <a th:unless="${reviewedMap.get(o.id)}" th:href="@{/consumer/order/{id}/review(id=${o.id})}"
                           class="btn btn-warning btn-sm py-0 px-2 btn-pulse">
                            <i class="bi bi-star-fill"></i> 去评价
                        </a>
                    </th:block>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
<th:block th:replace="~{fragments/consumer-nav :: bottom-nav}"></th:block>

<script>
// 倒计时更新
document.querySelectorAll('.countdown-timer').forEach(function(el) {
    var target = new Date(el.dataset.delivery).getTime();
    function tick() {
        var now = Date.now(), diff = Math.max(0, Math.floor((target - now) / 60000));
        el.textContent = diff + ' 分钟后';
        if (diff > 0) setTimeout(tick, 30000);
    }
    tick();
});

// 静默轮询：检测订单状态变化，有变化时提示用户手动刷新
(function poll() {
    var cards = document.querySelectorAll('.card-header');
    var snapshot = Array.from(cards).map(function(c) { return c.textContent.trim(); }).join('|');
    setTimeout(function() {
        fetch(window.location.href)
            .then(function(r) { return r.text(); })
            .then(function(html) {
                var doc = new DOMParser().parseFromString(html, 'text/html');
                var newCards = doc.querySelectorAll('.card-header');
                var newSnap = Array.from(newCards).map(function(c) { return c.textContent.trim(); }).join('|');
                if (newSnap !== snapshot && newCards.length > 0) {
                    showToast('订单状态有更新，请刷新页面查看', 'info', 5000);
                }
            })
            .catch(function() {});
        poll();
    }, 30000);
})();
</script>
</body>
</html>

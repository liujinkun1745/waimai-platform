<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <!-- 轮播图 -->
    <div id="promoCarousel" class="carousel slide mb-4 rounded-3 overflow-hidden shadow-sm" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active" style="height:200px;background:linear-gradient(135deg,#FFD101,#FF6B35)">
                <div class="d-flex align-items-center justify-content-center h-100 text-dark">
                    <div class="text-center">
                        <h4 class="fw-bold mb-1"><i class="bi bi-percent"></i> 新人首单立减10元</h4>
                        <p class="mb-0 opacity-75">注册即享优惠，快来体验吧！</p>
                    </div>
                </div>
            </div>
            <div class="carousel-item" style="height:200px;background:linear-gradient(135deg,#667eea,#764ba2)">
                <div class="d-flex align-items-center justify-content-center h-100 text-white">
                    <div class="text-center">
                        <h4 class="fw-bold mb-1"><i class="bi bi-lightning-charge"></i> 限时秒杀</h4>
                        <p class="mb-0 opacity-75">每日精选商品低至5折，手慢无！</p>
                    </div>
                </div>
            </div>
            <div class="carousel-item" style="height:200px;background:linear-gradient(135deg,#f093fb,#f5576c)">
                <div class="d-flex align-items-center justify-content-center h-100 text-white">
                    <div class="text-center">
                        <h4 class="fw-bold mb-1"><i class="bi bi-truck"></i> 免配送费</h4>
                        <p class="mb-0 opacity-75">部分商家满30元免配送费</p>
                    </div>
                </div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#promoCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#promoCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <!-- 分类导航 -->
    <div class="d-flex justify-content-around text-center mb-4 flex-wrap gap-1" id="typeNav">
        <a th:href="@{/consumer/index}" class="text-decoration-none category-item">
            <div class="fs-3">🔥</div><small class="text-muted fw-bold">全部</small>
        </a>
        <a th:href="@{/consumer/index(keyword='家常菜')}" class="text-decoration-none category-item">
            <div class="fs-3">🍜</div><small class="text-muted fw-bold">美食</small>
        </a>
        <a th:href="@{/consumer/index(keyword='烘焙')}" class="text-decoration-none category-item">
            <div class="fs-3">🍰</div><small class="text-muted fw-bold">甜点饮品</small>
        </a>
        <a th:href="@{/consumer/index(keyword='鲜果')}" class="text-decoration-none category-item">
            <div class="fs-3">🍎</div><small class="text-muted fw-bold">生鲜果蔬</small>
        </a>
        <a th:href="@{/consumer/index(keyword='烧烤')}" class="text-decoration-none category-item">
            <div class="fs-3">🍲</div><small class="text-muted fw-bold">火锅烧烤</small>
        </a>
        <a th:href="@{/consumer/index(keyword='汉堡')}" class="text-decoration-none category-item">
            <div class="fs-3">🍔</div><small class="text-muted fw-bold">小吃快餐</small>
        </a>
        <a th:href="@{/consumer/index(keyword='咖啡')}" class="text-decoration-none category-item">
            <div class="fs-3">☕</div><small class="text-muted fw-bold">咖啡奶茶</small>
        </a>
        <a th:href="@{/consumer/index(keyword='西饼')}" class="text-decoration-none category-item">
            <div class="fs-3">🎂</div><small class="text-muted fw-bold">蛋糕烘焙</small>
        </a>
        <a th:href="@{/consumer/index(keyword='超市')}" class="text-decoration-none category-item">
            <div class="fs-3">🏪</div><small class="text-muted fw-bold">超市便利</small>
        </a>
    </div>

    <!-- 排序栏 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0"><i class="bi bi-shop-window text-yellow"></i> 附近商家</h5>
        <div class="btn-group btn-group-sm">
            <a th:href="@{/consumer/index(sort=sales,keyword=${keyword})}"
               class="btn rounded-pill px-3" th:classappend="${sort!='rating'} ? 'btn-warning' : 'btn-outline-warning'">
                <i class="bi bi-sort-down"></i> 按销量
            </a>
            <a th:href="@{/consumer/index(sort=rating,keyword=${keyword})}"
               class="btn rounded-pill px-3" th:classappend="${sort=='rating'} ? 'btn-warning' : 'btn-outline-warning'">
                <i class="bi bi-star-fill"></i> 按评分
            </a>
        </div>
    </div>

    <!-- 搜索结果提示 -->
    <div th:if="${keyword != null and !keyword.isBlank()}" class="alert bg-yellow-light border-0 rounded-3 py-2 small mb-3">
        <i class="bi bi-search"></i> 搜索 "<strong th:text="${keyword}"></strong>" 的结果
        <a th:href="@{/consumer/index}" class="ms-2 text-decoration-none">清除</a>
    </div>

    <!-- 空状态 -->
    <div th:if="${#lists.isEmpty(merchants)}" class="empty-state">
        <span class="empty-icon"><i class="bi bi-shop-window"></i></span>
        <p class="empty-text fw-bold">没有找到相关商家</p>
        <p class="empty-hint">换个关键词试试，或 <a th:href="@{/consumer/index}">查看全部商家</a></p>
    </div>

    <!-- 商家列表 -->
    <div class="row g-3" id="merchantList">
        <div class="col-md-6 col-lg-4" th:each="m,iter : ${merchants}"
             th:style="'animation: slideUp 0.4s ease both; animation-delay: ' + ${iter.index * 0.05} + 's'">
            <a th:href="@{/consumer/merchant/{id}(id=${m.id})}" class="text-decoration-none">
                <div class="card merchant-card h-100">
                    <div class="card-body p-3">
                        <div class="d-flex">
                            <div class="merchant-avatar rounded-3 me-3 d-flex align-items-center justify-content-center flex-shrink-0"
                                 style="width:64px;height:64px;background:linear-gradient(135deg,#ffd101,#ffb800)">
                                <span class="text-white fw-bold" style="font-size:1.2rem"
                                      th:text="${#strings.substring(m.shopName,0,2)}">美味</span>
                            </div>
                            <div class="flex-grow-1 min-w-0">
                                <h6 class="mb-1 fw-bold truncate" th:text="${m.shopName}">店铺名称</h6>
                                <div class="mb-1">
                                    <span class="text-warning"><i class="bi bi-star-fill"></i></span>
                                    <span class="fw-bold text-warning small" th:text="${m.rating}">4.5</span>
                                    <small class="text-muted ms-1">月售<span th:text="${m.monthlySales}">0</span></small>
                                </div>
                                <div class="d-flex gap-2 small text-muted">
                                    <span>起送¥<span th:text="${m.minOrderAmount}">15</span></span>
                                    <span>配送¥<span th:text="${m.deliveryFee}">3</span></span>
                                    <span th:text="${m.businessHours}">09-22</span>
                                </div>
                            </div>
                        </div>
                        <p class="card-text small text-muted mt-2 mb-2 truncate" th:text="${m.description}"></p>
                        <span class="badge small" th:classappend="${m.status=='营业中'} ? 'bg-success' : 'bg-secondary'"
                              th:text="${m.status}">营业中</span>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>

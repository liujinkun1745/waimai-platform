<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收益统计 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <a href="javascript:history.back()" class="back-btn mb-3"><i class="bi bi-chevron-left"></i> 返回</a>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0"><i class="bi bi-graph-up text-yellow"></i> 收益统计</h5>
        <small class="text-muted" th:text="${merchant.shopName}"></small>
    </div>

    <!-- ===== 核心统计卡片 ===== -->
    <div class="row g-3 mb-4">
        <!-- 今日收益 -->
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card bg-white h-100 border-start border-4 border-warning">
                <div class="card-body p-3">
                    <small class="text-muted">今日收益</small>
                    <div class="fs-5 fw-bold text-danger">¥<span th:text="${todayEarnings}">0</span></div>
                    <small class="text-muted"><span th:text="${todayOrders}">0</span> 单</small>
                </div>
            </div>
        </div>
        <!-- 昨日收益 -->
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card bg-white h-100 border-start border-4" style="border-color:#3498DB!important">
                <div class="card-body p-3">
                    <small class="text-muted">昨日收益</small>
                    <div class="fs-5 fw-bold">¥<span th:text="${yesterdayEarnings}">0</span></div>
                    <small class="text-muted">&nbsp;</small>
                </div>
            </div>
        </div>
        <!-- 本周收益 -->
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card bg-white h-100 border-start border-4 border-success">
                <div class="card-body p-3">
                    <small class="text-muted">本周收益</small>
                    <div class="fs-5 fw-bold text-success">¥<span th:text="${weekEarnings}">0</span></div>
                    <small class="text-muted"><span th:text="${weekOrders}">0</span> 单</small>
                </div>
            </div>
        </div>
        <!-- 本月收益 -->
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card bg-white h-100 border-start border-4" style="border-color:#8E44AD!important">
                <div class="card-body p-3">
                    <small class="text-muted">本月收益</small>
                    <div class="fs-5 fw-bold" style="color:#8E44AD">¥<span th:text="${monthEarnings}">0</span></div>
                    <small class="text-muted"><span th:text="${monthOrders}">0</span> 单</small>
                </div>
            </div>
        </div>
        <!-- 上周收益 -->
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card bg-white h-100 border-start border-4 border-info">
                <div class="card-body p-3">
                    <small class="text-muted">上周收益</small>
                    <div class="fs-5 fw-bold">¥<span th:text="${lastWeekEarnings}">0</span></div>
                    <small class="text-muted">环比</small>
                </div>
            </div>
        </div>
        <!-- 累计收益 -->
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card bg-white h-100" style="border-left:4px solid var(--orange);background:linear-gradient(135deg,#FFF5F0,#FFF)">
                <div class="card-body p-3">
                    <small class="text-muted">累计收益</small>
                    <div class="fs-5 fw-bold" style="color:var(--orange)">¥<span th:text="${totalEarnings}">0</span></div>
                    <small class="text-muted"><span th:text="${totalOrders}">0</span> 单</small>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 订单状态分布 ===== -->
    <div class="row g-3 mb-4">
        <div class="col-3 col-md">
            <div class="card text-center py-2 border-0" style="background:#FFF3E0">
                <div class="fs-5 fw-bold text-warning" th:text="${pendingCount}">0</div>
                <small class="text-muted">待处理</small>
            </div>
        </div>
        <div class="col-3 col-md">
            <div class="card text-center py-2 border-0" style="background:#E3F2FD">
                <div class="fs-5 fw-bold text-info" th:text="${deliveringCount}">0</div>
                <small class="text-muted">配送中</small>
            </div>
        </div>
        <div class="col-3 col-md">
            <div class="card text-center py-2 border-0" style="background:#E8F5E9">
                <div class="fs-5 fw-bold text-success" th:text="${completedCount}">0</div>
                <small class="text-muted">已完成</small>
            </div>
        </div>
        <div class="col-3 col-md">
            <div class="card text-center py-2 border-0" style="background:#F5F5F5">
                <div class="fs-5 fw-bold text-secondary" th:text="${cancelledCount}">0</div>
                <small class="text-muted">已取消</small>
            </div>
        </div>
    </div>

    <!-- ===== 收益趋势图 ===== -->
    <div class="row g-3 mb-4">
        <div class="col-lg-8">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-bar-chart text-yellow"></i> 收益趋势</h6>
                    <div class="btn-group btn-group-sm" id="chartToggle">
                        <button class="btn btn-warning btn-sm active" data-range="7">近7天</button>
                        <button class="btn btn-outline-warning btn-sm" data-range="30">近30天</button>
                    </div>
                </div>
                <div class="card-body">
                    <canvas id="revenueChart" height="240"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white">
                    <h6 class="mb-0"><i class="bi bi-trophy text-yellow"></i> 热销商品 TOP5</h6>
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(topProducts)}" class="text-center py-4 text-muted small">暂无数据</div>
                    <div th:each="p,iter : ${topProducts}" class="d-flex align-items-center px-3 py-2 border-bottom">
                        <span class="badge me-2" th:classappend="${iter.index==0}?'bg-warning':(${iter.index==1}?'bg-secondary':(${iter.index==2}?'bg-light text-dark':'bg-light text-muted'))"
                              th:text="${iter.index+1}">1</span>
                        <span class="small flex-grow-1 text-truncate" th:text="${p.name}">商品名</span>
                        <span class="small text-muted">售<span th:text="${p.sales}">0</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 最近完成订单 ===== -->
    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h6 class="mb-0"><i class="bi bi-receipt text-yellow"></i> 最近完成订单</h6>
            <small class="text-muted">最近10笔</small>
        </div>
        <div th:if="${#lists.isEmpty(recentOrders)}" class="card-body text-center text-muted py-4">
            <i class="bi bi-inbox" style="font-size:2rem"></i>
            <p class="mb-0 mt-2 small">暂无完成的订单</p>
        </div>
        <div class="table-responsive" th:if="${!#lists.isEmpty(recentOrders)}">
            <table class="table table-sm table-hover mb-0">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>订单号</th>
                        <th class="text-end">金额</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${recentOrders}">
                        <td class="small" th:text="${#temporals.format(o.createdAt,'MM-dd HH:mm')}"></td>
                        <td class="small text-muted" th:text="${o.orderNo}"></td>
                        <td class="text-end fw-bold text-danger small">¥<span th:text="${o.totalAmount}"></span></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="table-warning">
                        <td colspan="2" class="text-end fw-bold small">合计</td>
                        <td class="text-end fw-bold text-danger small">
                            ¥<span th:text="${recentOrdersTotal}">0</span>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>

<script th:inline="javascript">
var chart7Labels = [[${chart7Labels}]];
var chart7Revenue = [[${chart7Revenue}]];
var chart7Orders = [[${chart7Orders}]];
var chart30Labels = [[${chart30Labels}]];
var chart30Revenue = [[${chart30Revenue}]];

var ctx = document.getElementById('revenueChart').getContext('2d');
var chart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: chart7Labels,
        datasets: [
            {
                label: '收益 (元)',
                data: chart7Revenue,
                backgroundColor: 'rgba(255,209,1,0.6)',
                borderColor: '#ffb800',
                borderWidth: 1,
                borderRadius: 6,
                yAxisID: 'y',
                order: 2
            },
            {
                label: '订单数',
                data: chart7Orders,
                type: 'line',
                borderColor: '#3498DB',
                backgroundColor: 'rgba(52,152,219,0.1)',
                borderWidth: 2,
                pointRadius: 4,
                pointBackgroundColor: '#3498DB',
                tension: 0.3,
                yAxisID: 'y1',
                order: 1
            }
        ]
    },
    options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(ctx) {
                        if (ctx.datasetIndex === 0) return '收益: ¥' + ctx.raw;
                        return '订单: ' + ctx.raw + ' 单';
                    }
                }
            }
        },
        scales: {
            y: {
                type: 'linear',
                position: 'left',
                title: { display: true, text: '收益 (元)' },
                beginAtZero: true,
                ticks: { callback: function(v) { return '¥' + v; } },
                grid: { color: '#f0f0f0' }
            },
            y1: {
                type: 'linear',
                position: 'right',
                title: { display: true, text: '订单数' },
                beginAtZero: true,
                ticks: { stepSize: 1 },
                grid: { drawOnChartArea: false }
            }
        }
    }
});

// 切换 7天 / 30天
document.getElementById('chartToggle').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    var range = btn.dataset.range;
    document.querySelectorAll('#chartToggle button').forEach(function(b) {
        b.className = 'btn btn-outline-warning btn-sm';
    });
    btn.className = 'btn btn-warning btn-sm active';

    if (range === '7') {
        chart.data.labels = chart7Labels;
        chart.data.datasets[0].data = chart7Revenue;
        chart.data.datasets[1].data = chart7Orders;
        chart.data.datasets[1].hidden = false;
    } else {
        chart.data.labels = chart30Labels;
        chart.data.datasets[0].data = chart30Revenue;
        chart.data.datasets[1].hidden = true; // 30天只显示收益
    }
    chart.update();
});
</script>
<th:block th:replace="~{fragments/merchant-nav :: bottom-nav}"></th:block>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <a href="javascript:history.back()" class="btn btn-outline-warning btn-sm mb-3">
        <i class="bi bi-arrow-left"></i> 返回
    </a>
    <h5 class="fw-bold mb-3"><i class="bi bi-receipt text-yellow"></i> 订单管理</h5>

    <!-- 状态筛选 -->
    <div class="mb-4">
        <nav class="nav nav-pills flex-wrap gap-1">
            <a class="nav-link" th:classappend="${currentStatus==null} ? 'active' : ''"
               th:href="@{/merchant/orders}">全部</a>
            <a class="nav-link" th:classappend="${currentStatus=='待接单'} ? 'active' : ''"
               th:href="@{/merchant/orders(status='待接单')}">待接单</a>
            <a class="nav-link" th:classappend="${currentStatus=='待配送'} ? 'active' : ''"
               th:href="@{/merchant/orders(status='待配送')}">待配送</a>
            <a class="nav-link" th:classappend="${currentStatus=='配送中'} ? 'active' : ''"
               th:href="@{/merchant/orders(status='配送中')}">配送中</a>
            <a class="nav-link" th:classappend="${currentStatus=='已完成'} ? 'active' : ''"
               th:href="@{/merchant/orders(status='已完成')}">已完成</a>
            <a class="nav-link" th:classappend="${currentStatus=='已取消'} ? 'active' : ''"
               th:href="@{/merchant/orders(status='已取消')}">已取消</a>
        </nav>
    </div>

    <!-- 空状态 -->
    <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
        <span class="empty-icon"><i class="bi bi-inbox"></i></span>
        <p class="empty-text fw-bold">暂无订单</p>
    </div>

    <!-- 订单卡片 -->
    <div th:each="o,iter : ${orders}" class="card shadow-sm mb-3"
         th:style="'animation: slideUp 0.35s ease both; animation-delay: ' + ${iter.index * 0.04} + 's'"
         th:with="items=${itemsMap.get(o.id)}">

        <!-- 卡片头部 -->
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-2">
            <div>
                <span class="status-badge" th:class="'status-' + ${o.status}" th:text="${o.status}"></span>
                <small class="text-muted ms-2" th:text="${#temporals.format(o.createdAt,'MM-dd HH:mm')}"></small>
            </div>
            <span class="text-danger fw-bold">¥<span th:text="${o.totalAmount}"></span></span>
        </div>

        <!-- 商品清单（直接展示） -->
        <div class="card-body p-3">
            <div class="order-items">
                <div th:each="item,it : ${items}" th:if="${it.index < 3}"
                     class="d-flex justify-content-between align-items-center py-1 border-bottom border-light small">
                    <span class="text-truncate" style="max-width:60%">
                        <span th:text="${item.productName}">商品名</span>
                    </span>
                    <span>
                        <span class="text-muted">×<span th:text="${item.quantity}">1</span></span>
                        <span class="ms-2">¥<span th:text="${item.subtotal}">0</span></span>
                    </span>
                </div>
                <div th:if="${items != null and items.size() > 3}" class="collapse" th:attr="id='more-'+${o.id}">
                    <div th:each="item,it : ${items}" th:if="${it.index >= 3}"
                         class="d-flex justify-content-between align-items-center py-1 border-bottom border-light small">
                        <span class="text-truncate" style="max-width:60%">
                            <span th:text="${item.productName}">商品名</span>
                        </span>
                        <span>
                            <span class="text-muted">×<span th:text="${item.quantity}">1</span></span>
                            <span class="ms-2">¥<span th:text="${item.subtotal}">0</span></span>
                        </span>
                    </div>
                </div>
                <button th:if="${items != null and items.size() > 3}"
                        class="btn btn-link btn-sm p-0 mt-1 text-decoration-none"
                        data-bs-toggle="collapse" th:attr="data-bs-target='#more-'+${o.id}"
                        onclick="var t=this; t.textContent=t.textContent.includes('查看全部')?'收起▲':'查看全部 ('+ (t.closest('.order-items').querySelectorAll('.collapse .d-flex').length) +'件) ▼'">
                    查看全部 (<span th:text="${items.size() - 3}">0</span>件) ▼
                </button>
                <div th:if="${items == null or items.isEmpty()}" class="small text-muted">暂无商品明细</div>
            </div>

            <!-- 底部信息 + 操作 -->
            <div class="d-flex justify-content-between align-items-end mt-2 pt-2 border-top">
                <div>
                    <small class="text-muted"><span th:text="${o.orderNo}"></span></small>
                    <div class="small text-muted text-truncate" style="max-width:260px" th:text="${o.addressSnapshot}"></div>
                </div>
                <div class="d-flex gap-1 flex-shrink-0">
                    <a th:href="@{/merchant/order/{id}(id=${o.id})}" class="btn btn-outline-warning btn-sm py-0 px-2">
                        <i class="bi bi-eye"></i>
                    </a>
                    <form th:if="${o.status=='待接单'}" th:action="@{/merchant/order/accept/{id}(id=${o.id})}" method="post">
                        <button type="submit" class="btn btn-warning btn-sm py-0 px-2">
                            <i class="bi bi-check-lg"></i> 接单
                        </button>
                    </form>
                    <form th:if="${o.status=='待配送'}" th:action="@{/merchant/order/deliver/{id}(id=${o.id})}" method="post">
                        <button type="submit" class="btn btn-info btn-sm py-0 px-2 text-white">
                            <i class="bi bi-truck"></i> 配送
                        </button>
                    </form>
                    <form th:if="${o.status=='配送中'}" th:action="@{/merchant/order/complete/{id}(id=${o.id})}" method="post">
                        <button type="submit" class="btn btn-success btn-sm py-0 px-2">
                            <i class="bi bi-check-circle"></i> 完成
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>

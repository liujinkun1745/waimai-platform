<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单详情 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <a th:href="@{/merchant/orders}" class="btn btn-outline-warning btn-sm mb-3">
        <i class="bi bi-arrow-left"></i> 返回订单列表
    </a>

    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-0">订单号: <span th:text="${order.orderNo}"></span></h6>
                    <small class="text-muted" th:text="${#temporals.format(order.createdAt,'yyyy-MM-dd HH:mm:ss')}"></small>
                </div>
                <span class="badge fs-6" th:classappend="${order.status == '待接单' || order.status == '待配送' || order.status == '配送中' ? 'bg-warning text-dark' : (order.status == '已完成' ? 'bg-success' : (order.status == '已取消' ? 'bg-secondary' : 'bg-info'))}"
                      th:text="${order.status}"></span>
            </div>
        </div>
        <div class="card-body" th:with="step=${order.step}">
            <!-- 步骤条 -->
            <div th:if="${order.status != '已取消'}" class="order-stepper mb-4 px-2">
                <div class="stepper-step">
                    <div class="stepper-dot" th:classappend="${step >= 0} ? 'active' : ''" style="width:34px;height:34px">
                        <span th:if="${step > 0}"><i class="bi bi-check"></i></span>
                        <span th:unless="${step > 0}">1</span>
                    </div>
                    <span class="stepper-label" th:classappend="${step == 0} ? 'active' : (${step > 0} ? 'done' : '')">待接单</span>
                </div>
                <div class="stepper-step">
                    <div class="stepper-dot" th:classappend="${step >= 1} ? 'active' : ''" style="width:34px;height:34px">
                        <span th:if="${step > 1}"><i class="bi bi-check"></i></span>
                        <span th:unless="${step > 1}">2</span>
                    </div>
                    <span class="stepper-label" th:classappend="${step == 1} ? 'active' : (${step > 1} ? 'done' : '')">待配送</span>
                </div>
                <div class="stepper-step">
                    <div class="stepper-dot" th:classappend="${step >= 2} ? 'active' : ''" style="width:34px;height:34px">
                        <span th:if="${step > 2}"><i class="bi bi-check"></i></span>
                        <span th:unless="${step > 2}">3</span>
                    </div>
                    <span class="stepper-label" th:classappend="${step == 2} ? 'active' : (${step > 2} ? 'done' : '')">配送中</span>
                </div>
                <div class="stepper-step">
                    <div class="stepper-dot" th:classappend="${step >= 3} ? 'done' : ''" style="width:34px;height:34px">
                        <span th:if="${step >= 3}"><i class="bi bi-check"></i></span>
                        <span th:unless="${step >= 3}">✓</span>
                    </div>
                    <span class="stepper-label" th:classappend="${step >= 3} ? 'done' : ''">已完成</span>
                </div>
            </div>
            <div th:if="${order.status == '已取消'}" class="stepper-cancelled mb-4">
                <div class="cancelled-dot" style="width:34px;height:34px"><i class="bi bi-x text-danger fs-5"></i></div>
                <div><strong>订单已取消</strong></div>
            </div>

            <!-- 商品列表 -->
            <table class="table table-sm">
                <thead class="table-light">
                    <tr><th>商品</th><th class="text-end">单价</th><th class="text-end">数量</th><th class="text-end">小计</th></tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.productName}"></td>
                        <td class="text-end">¥<span th:text="${item.price}"></span></td>
                        <td class="text-end" th:text="${item.quantity}"></td>
                        <td class="text-end fw-bold">¥<span th:text="${item.subtotal}"></span></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="table-warning">
                        <td colspan="3" class="text-end fw-bold">总金额</td>
                        <td class="text-end fw-bold text-danger fs-6">¥<span th:text="${order.totalAmount}"></span></td>
                    </tr>
                </tfoot>
            </table>

            <!-- 收货信息 -->
            <h6 class="fw-bold mt-4">收货信息</h6>
            <p class="text-muted" th:text="${order.addressSnapshot}"></p>
        </div>
    </div>
</div>


<!-- 加载 Bootstrap JS 和 main.js -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
<th:block th:replace="~{fragments/merchant-nav :: bottom-nav}"></th:block>
</body>
</html>

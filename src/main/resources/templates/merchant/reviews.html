<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顾客评价 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        body { padding-bottom: 80px; background: #F5F5F6; }
        .review-card {
            background: #FFF; border-radius: 12px; margin-bottom: 10px;
            border: 1px solid #EEE; overflow: hidden;
        }
        .star-bar { font-size: 0.85rem; color: #999; display: flex; align-items: center; gap: 6px; }
        .star-bar .bar-track { flex: 1; height: 6px; background: #EEE; border-radius: 3px; overflow: hidden; }
        .star-bar .bar-fill { height: 100%; background: var(--yellow); border-radius: 3px; transition: width 0.3s; }
    </style>
</head>
<body>
<div class="container px-3 pt-3">
    <div class="d-flex align-items-center gap-2 mb-3">
        <a th:href="@{/merchant/orders}" class="back-btn"><i class="bi bi-chevron-left"></i> 返回</a>
        <h5 class="fw-bold mb-0">顾客评价</h5>
    </div>

    <!-- 评分总览 -->
    <div class="card border-0 shadow-sm mb-3" style="border-radius:12px">
        <div class="card-body p-3">
            <div class="row align-items-center">
                <div class="col-4 text-center">
                    <div class="fs-1 fw-bold text-warning" th:text="${merchant.rating}">4.5</div>
                    <div class="small text-muted">店铺评分</div>
                    <div class="small text-muted" th:text="${#lists.size(reviews)} + ' 条评价'">0 条评价</div>
                </div>
                <div class="col-8">
                    <th:block th:each="star : ${#numbers.sequence(5, 1, -1)}">
                        <div class="star-bar mb-1">
                            <span th:text="${star} + '星'">5星</span>
                            <div class="bar-track">
                                <div class="bar-fill" th:style="'width:' + (${#lists.size(reviews) > 0 ? ratingDist[star] * 100.0 / #lists.size(reviews) : 0} + '%')"></div>
                            </div>
                            <small class="text-muted" th:text="${ratingDist[star]}">0</small>
                        </div>
                    </th:block>
                </div>
            </div>
        </div>
    </div>

    <!-- 评价列表 -->
    <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-5 text-muted">
        <i class="bi bi-chat-square-text fs-1"></i><p>暂无评价</p>
    </div>

    <div th:each="r : ${reviews}" class="review-card">
        <div class="card-body p-3">
            <div class="d-flex justify-content-between mb-2">
                <div>
                    <span class="fw-bold small" th:text="${r.consumer != null ? r.consumer.username : '匿名用户'}">用户</span>
                    <span class="text-warning small ms-2">
                        <th:block th:each="s : ${#numbers.sequence(1, roundedStars.get(r.id))}">⭐</th:block>
                        <small class="text-muted ms-1" th:text="${#numbers.formatDecimal(r.overallRating, 0, 1)}">4.0</small>
                    </span>
                </div>
                <small class="text-muted" th:text="${#temporals.format(r.createdAt,'MM-dd HH:mm')}"></small>
            </div>
            <div class="small text-muted mb-2">
                口味 <span th:text="${r.tasteRating}">4</span> ·
                包装 <span th:text="${r.packagingRating}">4</span> ·
                配送 <span th:text="${r.deliveryRating}">4</span>
            </div>
            <p class="small mb-0" th:if="${r.comment != null and !r.comment.isEmpty()}" th:text="${r.comment}"></p>
            <!-- 商家回复 -->
            <div th:if="${r.reply != null and !r.reply.isEmpty()}" class="mt-2 p-2 rounded" style="background:#FFF8E1;font-size:0.82rem">
                <span class="text-warning fw-bold">商家回复：</span><span th:text="${r.reply}"></span>
            </div>
            <!-- 回复按钮 -->
            <div class="mt-2" th:if="${r.reply == null or r.reply.isEmpty()}">
                <button class="btn btn-outline-warning btn-sm py-0 px-2" th:onclick="'showReplyBox(this, ' + ${r.id} + ')'">
                    <i class="bi bi-reply"></i> 回复
                </button>
            </div>
            <div class="reply-box mt-2" style="display:none" th:attr="data-rid=${r.id}">
                <textarea class="form-control form-control-sm mb-1" rows="2" placeholder="回复顾客..."></textarea>
                <button class="btn btn-warning btn-sm py-0 px-2" th:onclick="'submitReply(' + ${r.id} + ', this)'">发送</button>
                <button class="btn btn-sm py-0 px-2 text-muted" onclick="this.closest('.reply-box').style.display='none'">取消</button>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/merchant-nav :: bottom-nav}"></th:block>

<script>
function showReplyBox(btn, rid) {
    btn.style.display = 'none';
    document.querySelector('.reply-box[data-rid="' + rid + '"]').style.display = 'block';
}
function submitReply(rid, btn) {
    var box = btn.closest('.reply-box');
    var text = box.querySelector('textarea').value.trim();
    if (!text) return;
    var fd = new URLSearchParams();
    fd.append('reply', text);
    fetch('/merchant/review/reply/' + rid, { method: 'POST', body: fd })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.ok) {
                location.reload();
            }
        });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<!-- 修复说明：(1) 编辑按钮改用 data-* + 事件委托；(2) 分类列不再访问 lazy 属性导致 500；(3) 添加返回按钮 -->
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm me-2" title="返回上一页">
                <i class="bi bi-arrow-left"></i> 返回
            </a>
            <h5 class="fw-bold mb-0 d-inline"><i class="bi bi-box"></i> 商品管理</h5>
        </div>
        <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#productModal"
                onclick="clearProductForm()">
            <i class="bi bi-plus-lg"></i> 新增商品
        </button>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 text-muted">
        <i class="bi bi-box" style="font-size:3rem"></i>
        <p class="mt-2">暂无商品，请添加</p>
    </div>

    <div class="table-responsive">
        <table class="table table-hover shadow-sm" th:if="${!#lists.isEmpty(products)}">
            <thead class="table-warning">
                <tr>
                    <th>#</th>
                    <th>商品名称</th>
                    <th>价格</th>
                    <th>库存</th>
                    <th>销量</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td class="text-danger fw-bold">¥<span th:text="${p.price}"></span></td>
                    <td th:text="${p.stock}"></td>
                    <td th:text="${p.sales}"></td>
                    <td>
                        <span class="badge" th:classappend="${p.status=='上架'} ? 'bg-success' : 'bg-secondary'"
                              th:text="${p.status}"></span>
                    </td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <!-- 编辑：用 data-* 避免内联 onclick 引号转义问题 -->
                            <button class="btn btn-outline-warning btn-sm edit-product-btn"
                                    data-bs-toggle="modal" data-bs-target="#productModal"
                                    th:attr="data-id=${p.id},data-cat=${p.category.id},data-name=${p.name},data-price=${p.price},data-stock=${p.stock},data-image=${p.image},data-desc=${p.description}">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <a th:href="@{/merchant/product/toggle/{id}(id=${p.id})}"
                               class="btn btn-outline-info btn-sm" th:title="${p.status=='上架'} ? '下架' : '上架'">
                                <i class="bi bi-arrow-repeat"></i>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 商品 Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/merchant/product/add}" method="post" id="productForm">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalTitle">新增商品</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-2">
                        <div class="col-12">
                            <label class="form-label">商品名称 <span class="text-danger">*</span></label>
                            <input type="text" name="name" id="prodName" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">所属分类 <span class="text-danger">*</span></label>
                            <select name="categoryId" id="prodCat" class="form-select" required>
                                <option value="">请选择</option>
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label">价格 (元) <span class="text-danger">*</span></label>
                            <input type="number" name="price" id="prodPrice" class="form-control" step="0.01" min="0" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">库存 <span class="text-danger">*</span></label>
                            <input type="number" name="stock" id="prodStock" class="form-control" min="0" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">图片 URL</label>
                            <input type="text" name="image" id="prodImage" class="form-control"
                                   placeholder="/images/food1.svg">
                        </div>
                        <div class="col-12">
                            <label class="form-label">商品描述</label>
                            <textarea name="description" id="prodDesc" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-warning">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function clearProductForm() {
        document.getElementById('productModalTitle').textContent = '新增商品';
        document.getElementById('productForm').action = '/merchant/product/add';
        document.getElementById('prodName').value = '';
        document.getElementById('prodCat').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('prodStock').value = '999';
        document.getElementById('prodImage').value = '';
        document.getElementById('prodDesc').value = '';
    }

    // 编辑 — 事件委托，避免 th:attr 内联 onclick 参数转义问题
    document.addEventListener('click', function (e) {
        var btn = e.target.closest('.edit-product-btn');
        if (!btn) return;
        var catId = btn.getAttribute('data-cat');
        document.getElementById('productModalTitle').textContent = '编辑商品';
        document.getElementById('productForm').action = '/merchant/product/edit/' + btn.getAttribute('data-id');
        document.getElementById('prodName').value = btn.getAttribute('data-name') || '';
        document.getElementById('prodCat').value = catId || '';
        document.getElementById('prodPrice').value = btn.getAttribute('data-price') || '';
        document.getElementById('prodStock').value = btn.getAttribute('data-stock') || '0';
        document.getElementById('prodImage').value = btn.getAttribute('data-image') || '';
        document.getElementById('prodDesc').value = btn.getAttribute('data-desc') || '';
    });
</script>


<!-- 加载 Bootstrap JS 和 main.js -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>

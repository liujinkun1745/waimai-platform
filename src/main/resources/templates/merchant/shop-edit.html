<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店铺设置 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm mb-3" title="返回上一页">
        <i class="bi bi-arrow-left"></i> 返回
    </a>
    <h5 class="fw-bold mb-3"><i class="bi bi-gear"></i> 店铺设置</h5>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/merchant/shop/update}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">店铺名称 <span class="text-danger">*</span></label>
                        <input type="text" name="shopName" class="form-control"
                               th:value="${merchant.shopName}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">店铺头像 URL</label>
                        <input type="text" name="shopAvatar" class="form-control"
                               th:value="${merchant.shopAvatar}" placeholder="留空则不修改">
                    </div>
                    <div class="col-12">
                        <label class="form-label">店铺简介</label>
                        <textarea name="description" class="form-control" rows="2"
                                  th:text="${merchant.description}"></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">营业时间</label>
                        <input type="text" name="businessHours" class="form-control"
                               th:value="${merchant.businessHours}" placeholder="如 09:00-22:00">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">配送费 (元)</label>
                        <input type="number" name="deliveryFee" class="form-control"
                               th:value="${merchant.deliveryFee}" step="0.01" min="0">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">起送价 (元)</label>
                        <input type="number" name="minOrderAmount" class="form-control"
                               th:value="${merchant.minOrderAmount}" step="0.01" min="0">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-lg"></i> 保存设置
                        </button>
                    </div>
                </div>
            </form>

            <hr class="my-4">

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label text-muted">店铺地址</label>
                    <p th:text="${merchant.shopAddress}"></p>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted">营业执照号</label>
                    <p th:text="${merchant.businessLicense}"></p>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted">当前评分</label>
                    <p><span class="text-warning"><i class="bi bi-star-fill"></i></span> <strong th:text="${merchant.rating}"></strong></p>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted">月销量</label>
                    <p><strong th:text="${merchant.monthlySales}"></strong> 单</p>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- 加载 Bootstrap JS 和 main.js -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>

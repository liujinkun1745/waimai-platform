<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        body { padding-bottom: 80px; background: #F5F5F6; }
        .my-header {
            background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
            padding: 2rem 1.5rem 1.5rem; color: #333;
            border-radius: 0 0 24px 24px;
        }
        .my-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin-bottom: 8px;
        }
        .menu-item {
            display: flex; align-items: center; gap: 14px;
            padding: 16px; background: #FFF; border-radius: 12px;
            margin-bottom: 10px; text-decoration: none; color: #333;
            transition: all 0.15s;
        }
        .menu-item:hover { background: #FFF8E1; transform: translateX(3px); }
        .menu-icon {
            width: 42px; height: 42px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="my-header">
    <div class="d-flex align-items-center gap-3">
        <div class="my-avatar">🏪</div>
        <div class="text-white">
            <h5 class="fw-bold mb-0" th:text="${merchant.shopName}">店铺名</h5>
            <small>⭐<span th:text="${merchant.rating}">4.5</span> · 月售<span th:text="${merchant.monthlySales}">0</span></small>
        </div>
    </div>
</div>

<div class="container px-3 pt-3" style="max-width:500px">
    <a th:href="@{/merchant/shop/edit}" class="menu-item">
        <div class="menu-icon" style="background:#FFF3E0">⚙️</div>
        <div class="flex-grow-1"><div class="fw-bold small">店铺设置</div><small class="text-muted">编辑信息/配送费/营业时间</small></div>
        <i class="bi bi-chevron-right text-muted"></i>
    </a>
    <a th:href="@{/merchant/earnings}" class="menu-item">
        <div class="menu-icon" style="background:#E8F5E9">📊</div>
        <div class="flex-grow-1"><div class="fw-bold small">收益统计</div><small class="text-muted">查看收入趋势</small></div>
        <i class="bi bi-chevron-right text-muted"></i>
    </a>
    <a th:href="@{/merchant/shop/toggle-status}" class="menu-item">
        <div class="menu-icon" style="background:#E3F2FD">🔄</div>
        <div class="flex-grow-1"><div class="fw-bold small">营业状态</div>
            <small class="text-muted">当前: <span th:text="${merchant.status}">营业中</span></small></div>
        <i class="bi bi-chevron-right text-muted"></i>
    </a>
    <form th:action="@{/auth/logout}" method="post">
        <button type="submit" class="menu-item w-100 border-0" style="cursor:pointer">
            <div class="menu-icon" style="background:#FEE">🚪</div>
            <div class="flex-grow-1 text-start"><div class="fw-bold small text-danger">安全登出</div></div>
            <i class="bi bi-chevron-right text-muted"></i>
        </button>
    </form>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/merchant-nav :: bottom-nav}"></th:block>
</body>
</html>

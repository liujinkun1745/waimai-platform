<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家仪表盘 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<th:block th:replace="~{fragments/layout :: header}"></th:block>
<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

<div class="container mt-4">
    <!-- 商家信息头部 -->
    <div class="d-flex flex-wrap justify-content-between align-items-start mb-3">
        <div>
            <h4 class="fw-bold mb-0" th:text="${merchant.shopName}">店铺名称</h4>
            <small class="text-muted" th:text="${merchant.shopAddress}"></small>
        </div>
        <a th:href="@{/merchant/shop/toggle-status}" class="btn rounded-pill px-4"
           th:classappend="${merchant.status=='营业中'} ? 'btn-success' : 'btn-secondary'">
            <i class="bi bi-power"></i> <span th:text="${merchant.status}"></span>
        </a>
    </div>

    <!-- 统计卡片 -->
    <div class="row g-3 mb-4">
        <!-- 待接单 -->
        <div class="col-6 col-lg-3">
            <a th:href="@{/merchant/orders(status='待接单')}" class="text-decoration-none">
                <div class="card stat-card bg-white h-100 border-start border-4 border-warning">
                    <div class="card-body d-flex align-items-center gap-3 p-3">
                        <div class="stat-icon rounded-3 d-flex align-items-center justify-content-center"
                             style="width:48px;height:48px;background:#FFF3E0">
                            <span style="font-size:1.5rem">📋</span>
                        </div>
                        <div>
                            <div class="fs-4 fw-bold" th:text="${pendingCount}">0</div>
                            <small class="text-muted">待接单</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <!-- 今日订单 -->
        <div class="col-6 col-lg-3">
            <a th:href="@{/merchant/orders}" class="text-decoration-none">
                <div class="card stat-card bg-white h-100 border-start border-4 border-info">
                    <div class="card-body d-flex align-items-center gap-3 p-3">
                        <div class="stat-icon rounded-3 d-flex align-items-center justify-content-center"
                             style="width:48px;height:48px;background:#E3F2FD">
                            <span style="font-size:1.5rem">🛒</span>
                        </div>
                        <div>
                            <div class="fs-4 fw-bold" th:text="${todayOrderCount}">0</div>
                            <small class="text-muted">今日订单</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <!-- 商品总数 -->
        <div class="col-6 col-lg-3">
            <a th:href="@{/merchant/products}" class="text-decoration-none">
                <div class="card stat-card bg-white h-100 border-start border-4 border-success">
                    <div class="card-body d-flex align-items-center gap-3 p-3">
                        <div class="stat-icon rounded-3 d-flex align-items-center justify-content-center"
                             style="width:48px;height:48px;background:#E8F5E9">
                            <span style="font-size:1.5rem">📦</span>
                        </div>
                        <div>
                            <div class="fs-4 fw-bold" th:text="${productCount}">0</div>
                            <small class="text-muted">商品总数</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <!-- 评分 -->
        <div class="col-6 col-lg-3">
            <a th:href="@{/merchant/shop/edit}" class="text-decoration-none">
                <div class="card stat-card bg-white h-100 border-start border-4"
                     style="border-color:var(--purple) !important">
                    <div class="card-body d-flex align-items-center gap-3 p-3">
                        <div class="stat-icon rounded-3 d-flex align-items-center justify-content-center"
                             style="width:48px;height:48px;background:var(--purple-light)">
                            <span style="font-size:1.5rem">⭐</span>
                        </div>
                        <div>
                            <div class="fs-4 fw-bold" th:text="${merchant.rating}">4.5</div>
                            <small class="text-muted">店铺评分</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- 快捷入口 -->
    <h6 class="fw-bold mb-3"><i class="bi bi-grid-3x3-gap text-yellow"></i> 快捷入口</h6>
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <a th:href="@{/merchant/orders}" class="text-decoration-none">
                <div class="card merchant-quick-btn text-center py-3 h-100">
                    <div class="card-body">
                        <span class="fs-2 d-inline-block">📋</span>
                        <div class="fw-bold small mt-1">订单管理</div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a th:href="@{/merchant/products}" class="text-decoration-none">
                <div class="card merchant-quick-btn text-center py-3 h-100">
                    <div class="card-body">
                        <span class="fs-2 d-inline-block">📦</span>
                        <div class="fw-bold small mt-1">商品管理</div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a th:href="@{/merchant/categories}" class="text-decoration-none">
                <div class="card merchant-quick-btn text-center py-3 h-100">
                    <div class="card-body">
                        <span class="fs-2 d-inline-block">🏷️</span>
                        <div class="fw-bold small mt-1">分类管理</div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a th:href="@{/merchant/earnings}" class="text-decoration-none">
                <div class="card merchant-quick-btn text-center py-3 h-100">
                    <div class="card-body">
                        <span class="fs-2 d-inline-block">📊</span>
                        <div class="fw-bold small mt-1">收益统计</div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>

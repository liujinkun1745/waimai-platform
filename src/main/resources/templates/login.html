<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 美味外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #FFF8E1 0%, #FFE082 40%, #FFCA28 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .login-page::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -30%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            pointer-events: none;
        }
        .login-page::after {
            content: '';
            position: fixed;
            bottom: -40%;
            left: -20%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            pointer-events: none;
        }
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            padding: 2.5rem 2rem;
            animation: slideUp 0.5s ease;
        }
        .login-logo {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .login-logo .bi { font-size: 2rem; color: #FFF; }
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: var(--yellow-dark);
        }
    </style>
</head>
<body>

<div class="login-page">
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo"><i class="bi bi-shop"></i></div>
        <h4 class="fw-bold text-center mb-1">美味<span style="color:var(--yellow-dark)">外卖</span></h4>
        <p class="text-muted text-center mb-4 small">本地生活服务平台</p>

        <!-- 消息提示 -->
        <div th:if="${error}" class="alert alert-danger py-2 d-flex align-items-center gap-2 small">
            <i class="bi bi-exclamation-circle"></i><span th:text="${error}"></span>
        </div>
        <div th:if="${message}" class="alert alert-success py-2 d-flex align-items-center gap-2 small">
            <i class="bi bi-check-circle"></i><span th:text="${message}"></span>
        </div>

        <!-- 登录表单 -->
        <form th:action="@{/auth/login}" method="post">
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control" id="usernameInp"
                       placeholder="用户名/手机号" required autofocus>
                <label for="usernameInp"><i class="bi bi-person"></i> 用户名/手机号</label>
            </div>
            <div class="form-floating mb-3 position-relative">
                <input type="password" name="password" class="form-control" id="passwordInp"
                       placeholder="密码" required>
                <label for="passwordInp"><i class="bi bi-lock"></i> 密码</label>
                <button type="button" class="btn btn-sm position-absolute top-50 end-0 translate-middle-y me-2 border-0 bg-transparent text-muted"
                        style="z-index:5" id="togglePwd" tabindex="-1">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="remember-me" class="form-check-input" id="rememberMe">
                <label class="form-check-label small" for="rememberMe">记住我 (7天)</label>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold py-2">
                <i class="bi bi-box-arrow-in-right"></i> 立即登录
            </button>
        </form>

        <div class="text-center mt-3">
            <span class="text-muted small">还没有账号？</span>
            <a th:href="@{/register}" class="text-decoration-none small fw-bold">立即注册</a>
        </div>

        <!-- 测试账号 -->
        <div class="mt-4 p-3 rounded-3 small" style="background:var(--yellow-light)">
            <div class="fw-bold mb-1"><i class="bi bi-key"></i> 测试账号</div>
            <div class="d-flex justify-content-between">
                <span>消费者:</span><code class="text-dark">13800138000</code>
            </div>
            <div class="d-flex justify-content-between">
                <span>商家:</span><code class="text-dark">13900139000</code>
            </div>
            <div class="text-center text-muted mt-1">密码均为 <code class="text-dark">123456</code></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('togglePwd').addEventListener('click', function(){
    var inp = document.getElementById('passwordInp');
    var icon = this.querySelector('i');
    if (inp.type === 'password') {
        inp.type = 'text'; icon.classList.replace('bi-eye','bi-eye-slash');
    } else {
        inp.type = 'password'; icon.classList.replace('bi-eye-slash','bi-eye');
    }
});
</script>
</body>
</html>
